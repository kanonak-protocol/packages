agent-capabilities:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: capabilities
          match: ^
          version: 2.0.0
          alias: cap
        - package: agents
          match: ^
          version: 1.0.0
          alias: agents

agent-instance-deployment:
  type: cap.DeploymentTarget
  label: Agent Instance Deployment
  comment: >
    Deployment target for agents.Agent instances. Transforms each
    Agent into its target client's on-disk file format
    (markdown-with-frontmatter for Claude Code and Gemini CLI, TOML
    for Codex) and writes it to the client's projectAgentDir or
    userAgentDir as declared on the selected agent-skills.Client.
    The CLI registers an AgentDeploymentHandler under this
    instance's canonical URI to perform the actual materialization.

agent-management:
  type: cap.Capability
  commandName: agent
  cap.description: >
    Manage AI agent definitions. Install, list, update, and remove
    Agents from Kanonak publishers. Agents are transformed from
    Kanonak YAML to the target client's on-disk format and placed
    in the client's agent discovery directory. Supports Claude
    Code, OpenAI Codex, Gemini CLI, and the cross-client .agents/
    layout.
  managesType: agents.Agent
  deploymentTarget: agent-instance-deployment
  hasCommand:

    add-agent:
      subcommandName: add
      cap.description: Install an agent from a Kanonak publisher.
      performs: cap.fetch-and-deploy
      hasArgument:
        package:
          argumentName: package
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    remove-agent:
      subcommandName: remove
      cap.description: Remove an installed agent.
      performs: cap.remove-deployed
      hasArgument:
        agent-name:
          argumentName: agent-name
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    list-agents:
      subcommandName: list
      cap.description: List installed agents.
      performs: cap.list-deployed
      hasArgument:
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    update-agents:
      subcommandName: update
      cap.description: Update installed agents to their latest compatible versions.
      performs: cap.update-deployed
      hasArgument:
        agent-name:
          argumentName: agent-name
          isRequired: false
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    search-agents:
      subcommandName: search
      cap.description: Search for agents from a publisher.
      performs: cap.search-available
      hasArgument:
        publisher:
          argumentName: publisher
          isRequired: false
          isOption: true

    agent-info:
      subcommandName: info
      cap.description: Show details about an installed agent.
      performs: cap.show-info
      hasArgument:
        agent-name:
          argumentName: agent-name
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project
