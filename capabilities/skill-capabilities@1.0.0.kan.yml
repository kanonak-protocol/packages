skill-capabilities:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: capabilities
          match: ^
          version: 1.0.0
          alias: cap
        - package: agent-skills
          match: ^
          version: 1.0.0
          alias: skills

skill-management:
  type: cap.Capability
  commandName: skill
  cap.description: >
    Manage AI agent skills. Install, list, update, and remove Skills from
    Kanonak publishers. Skills are transformed from Kanonak YAML to
    SKILL.md format and placed in agent discovery directories for
    Claude Code, Gemini CLI, OpenAI Codex, and other compatible agents.
  managesType: skills.Skill
  deploymentTarget: cap.AgentSkillDeployment
  hasCommand:

    AddSkill:
      subcommandName: add
      cap.description: Install a skill from a Kanonak publisher.
      performs: cap.fetchAndDeploy
      hasArgument:
        Package:
          argumentName: package
          isRequired: true
          isOption: false
        Client:
          argumentName: client
          isRequired: false
          isOption: true
        Scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    RemoveSkill:
      subcommandName: remove
      cap.description: Remove an installed skill.
      performs: cap.removeDeployed
      hasArgument:
        SkillName:
          argumentName: skill-name
          isRequired: true
          isOption: false
        Client:
          argumentName: client
          isRequired: false
          isOption: true
        Scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    ListSkills:
      subcommandName: list
      cap.description: List installed skills.
      performs: cap.listDeployed
      hasArgument:
        Client:
          argumentName: client
          isRequired: false
          isOption: true
        Scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    UpdateSkills:
      subcommandName: update
      cap.description: Update installed skills to their latest compatible versions.
      performs: cap.updateDeployed
      hasArgument:
        SkillName:
          argumentName: skill-name
          isRequired: false
          isOption: false
        Client:
          argumentName: client
          isRequired: false
          isOption: true
        Scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    SearchSkills:
      subcommandName: search
      cap.description: Search for skills from a publisher.
      performs: cap.searchAvailable
      hasArgument:
        Publisher:
          argumentName: publisher
          isRequired: false
          isOption: true

    SkillInfo:
      subcommandName: info
      cap.description: Show details about an installed skill.
      performs: cap.showInfo
      hasArgument:
        SkillName:
          argumentName: skill-name
          isRequired: true
          isOption: false
        Client:
          argumentName: client
          isRequired: false
          isOption: true
        Scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project
