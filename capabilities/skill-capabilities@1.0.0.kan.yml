skill-capabilities:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: capabilities
          match: ^
          version: 1.0.0
          alias: cap
        - package: agent-skills
          match: ^
          version: 1.0.0
          alias: skills

skill-management:
  type: cap.Capability
  commandName: skill
  cap.description: >
    Manage AI agent skills. Install, list, update, and remove Skills from
    Kanonak publishers. Skills are transformed from Kanonak YAML to
    SKILL.md format and placed in agent discovery directories for
    Claude Code, Gemini CLI, OpenAI Codex, and other compatible agents.
  managesType: skills.Skill
  deploymentTarget: cap.agent-skill-deployment
  hasCommand:

    add-skill:
      subcommandName: add
      cap.description: Install a skill from a Kanonak publisher.
      performs: cap.fetch-and-deploy
      hasArgument:
        package:
          argumentName: package
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    remove-skill:
      subcommandName: remove
      cap.description: Remove an installed skill.
      performs: cap.remove-deployed
      hasArgument:
        skill-name:
          argumentName: skill-name
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    list-skills:
      subcommandName: list
      cap.description: List installed skills.
      performs: cap.list-deployed
      hasArgument:
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    update-skills:
      subcommandName: update
      cap.description: Update installed skills to their latest compatible versions.
      performs: cap.update-deployed
      hasArgument:
        skill-name:
          argumentName: skill-name
          isRequired: false
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project

    search-skills:
      subcommandName: search
      cap.description: Search for skills from a publisher.
      performs: cap.search-available
      hasArgument:
        publisher:
          argumentName: publisher
          isRequired: false
          isOption: true

    skill-info:
      subcommandName: info
      cap.description: Show details about an installed skill.
      performs: cap.show-info
      hasArgument:
        skill-name:
          argumentName: skill-name
          isRequired: true
          isOption: false
        client:
          argumentName: client
          isRequired: false
          isOption: true
        scope:
          argumentName: scope
          isRequired: false
          isOption: true
          defaultValue: project
