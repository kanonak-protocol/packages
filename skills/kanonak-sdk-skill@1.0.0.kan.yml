kanonak-sdk-skill:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: agent-skills
          match: ^
          version: 1.0.0
          alias: skills
        - package: core-spdx
          match: ^
          version: 1.0.0
          alias: spdx

kanonak-sdk:
  type: skills.Skill
  skills.name: kanonak-sdk
  description: >-
    Teaches an AI agent how to use the @kanonak-protocol/sdk TypeScript
    package, with a deliberate focus on the graph features used to build
    visualization applications. Covers installation in Node and browser
    environments, parsing Kanonak YAML, the repository abstractions for
    local and HTTP-backed loading, the SubjectKanonak object model that
    consumers walk to read entities, the GraphBuilder API, the node and
    edge shape, and common integration patterns for visualization
    libraries like Cytoscape, vis-network, and D3. Use when building
    any tool that needs to read, traverse, or visualize Kanonak
    documents - especially when you cannot read SDK source code
    directly because the published bundle is minified.
  license: spdx.Apache-2-0
  compatibility: >-
    Requires @kanonak-protocol/sdk version 1.4.0 or later. Node 18+ for
    the Node entry point; modern evergreen browsers for the browser
    entry point. Network access to publisher domains for HTTP-backed
    repositories.
  allowedTools:
    - skills.read
    - skills.grep
    - skills.glob
    - skills.web-fetch
    - skills.bash
  hasSection:

    - title: What the SDK provides
      body: |
        The @kanonak-protocol/sdk package is the canonical TypeScript
        consumer of the Kanonak Protocol. It exposes:

        - **Parsing** â€” `KanonakParser` reads `.kan.yml` text into a
          `KanonakDocument`. `KanonakObjectParser` then walks that
          document with full URI resolution and produces
          `SubjectKanonak[]`, the parsed object model with resolved
          references.
        - **Repositories** â€” pluggable `IKanonakDocumentRepository`
          implementations that load documents from memory, the
          local filesystem, an HTTP origin, or any composition of
          those. Repositories are how imports get resolved across
          packages.
        - **Resolution** â€” `ResourceResolver` and `KanonakUri` for
          looking up entities by name across a repository's
          transitive imports.
        - **Object model** â€” `Kanonak`, `SubjectKanonak`,
          `EmbeddedKanonak`, `ReferenceKanonak`, plus a family of
          `IStatement` subclasses (`StringStatement`,
          `ReferenceStatement`, `ListStatement`, `EmbeddedStatement`,
          etc.). Every statement carries a `predicate: ReferenceKanonak`
          whose `subject: KanonakUri` is the canonical identity of the
          property the statement is talking about.
        - **Graph** â€” `GraphBuilder` produces visualization-ready
          `{ nodes, edges }` data from a repository or a single
          document. This is the primary subject of this skill.
        - **Validation** â€” a large set of document and repository
          validation rules (out of scope here).

        The SDK's published bundle is minified. Do not try to read
        the source â€” read this skill instead, plus the .d.ts files
        that ship in the package for type information.

    - title: Installation and entry points
      body: |
        Install once:

        ```bash
        npm install @kanonak-protocol/sdk
        ```

        The package has TWO entry points and you must pick the right
        one:

        ```ts
        // Node / server-side / CLI tools
        import {
          KanonakParser,
          KanonakObjectParser,
          GraphBuilder,
          InMemoryKanonakDocumentRepository,
          FileSystemKanonakDocumentRepository,
          HttpKanonakDocumentRepository,
          CompositeKanonakDocumentRepository,
        } from '@kanonak-protocol/sdk';
        ```

        ```ts
        // Browser / web app
        import {
          KanonakParser,
          KanonakObjectParser,
          GraphBuilder,
          InMemoryKanonakDocumentRepository,
          HttpKanonakDocumentRepository,
          PublisherIndex,
          PublisherConfigResolver,
        } from '@kanonak-protocol/sdk/browser';
        ```

        The browser entry point excludes `FileSystemKanonakDocumentRepository`,
        `CompositeKanonakDocumentRepository`, `RepositoryFactory`, and
        `getGlobalCachePath` because those require Node's `fs` and
        `path` modules. Importing the Node entry point in a browser
        bundle will fail at bundle time with a missing-built-in error.
        Importing the browser entry point in Node still works.

    - title: Parsing a single document
      body: |
        `KanonakParser.parse(text)` turns YAML text into a
        `KanonakDocument`. The document has two parts:

        ```ts
        interface KanonakDocument {
          metadata: {
            namespace_?: { publisher, package_, version };
            imports?: Record<publisher, Import[]>;
          };
          body: Record<entityName, RawEntity>;
        }
        ```

        `body` is the raw YAML dict â€” every top-level entity in the
        document. `metadata.namespace_` carries the package's
        canonical identity (publisher, package, version). `metadata.imports`
        lists the imported packages with their alias and version
        constraints.

        ```ts
        import { KanonakParser } from '@kanonak-protocol/sdk';

        const parser = new KanonakParser();
        const doc = parser.parse(yamlText);
        console.log(doc.metadata.namespace_); // -> kanonak.org/agent-skills@1.0.0
        console.log(Object.keys(doc.body));   // -> top-level entity names
        ```

        Do NOT try to interpret `doc.body` directly â€” the keys you see
        are local names whose semantics depend on the document's
        imports. Always feed `doc` into a repository and walk it with
        `KanonakObjectParser` for resolved URIs.

    - title: Repository abstractions
      body: |
        A repository (`IKanonakDocumentRepository`) is the SDK's
        abstraction for "where do documents live". Every consumer
        gives the parser a repository so import resolution can find
        related packages. The interface:

        ```ts
        interface IKanonakDocumentRepository {
          getAllDocumentsAsync(): Promise<KanonakDocument[]>;
          getDocumentAsync(id: string): Promise<KanonakDocument | null>;
          getDocumentsByNamespaceAsync(publisher, package_): Promise<KanonakDocument[]>;
          getHighestCompatibleVersionAsync(publisher, import_): Promise<KanonakDocument | null>;
          // ...plus save/delete/clear methods used by writers
        }
        ```

        The SDK ships several implementations. Pick by environment:

        ```ts
        // In-memory: build up by calling saveDocumentAsync().
        // Works in Node AND browser. Best for tests and tools that
        // already have document content in hand.
        const repo = new InMemoryKanonakDocumentRepository(parser);
        await repo.saveDocumentAsync(doc, 'my-doc-id');

        // HTTP: fetches https://{publisher}/{package}/{version}.kan.yml
        // and respects /.well-known/kanonak.json. Works in Node AND
        // browser. Pass an authenticated fetch if needed.
        const httpRepo = new HttpKanonakDocumentRepository({
          getFromCache: (pub, pkg, ver) => null,
          onFetch: (pub, pkg, ver, content) => { /* optional cache write */ },
        });

        // Filesystem: reads from a directory tree on disk.
        // NODE ONLY - browser bundles will fail.
        const fsRepo = new FileSystemKanonakDocumentRepository(
          '/path/to/packages',
          true /* recursive */,
          parser
        );

        // Composite: chain multiple repos. First match wins for reads.
        // NODE ONLY - relies on filesystem repo internally.
        const composite = new CompositeKanonakDocumentRepository(repos);
        ```

        **Browser visualizers should compose `InMemoryKanonakDocumentRepository`
        with `HttpKanonakDocumentRepository`** to get local-first
        plus HTTP fallback. There is no `LocalFirstRepository` exposed
        from the SDK â€” that lives in the CLI source â€” so do the
        composition yourself in your app.

    - title: SubjectKanonak object model
      body: |
        `KanonakObjectParser.parseKanonaks(repository)` is the
        function that gives you the parsed object model with all
        references resolved to canonical URIs. It returns
        `Kanonak[]` â€” but in practice the entries you care about
        are `SubjectKanonak` instances, one per top-level entity
        across every document in the repository.

        ```ts
        import {
          KanonakObjectParser,
          SubjectKanonak,
          ReferenceStatement,
          StringStatement,
          ListStatement,
        } from '@kanonak-protocol/sdk';

        const objectParser = new KanonakObjectParser();
        const kanonaks = await objectParser.parseKanonaks(repo);

        for (const k of kanonaks) {
          if (!(k instanceof SubjectKanonak)) continue;
          console.log(k.namespace, k.name); // e.g. kanonak.org/agent-skills@1.0.0 Skill

          for (const stmt of k.statement) {
            // Every statement carries:
            //   stmt.predicate.subject  -> KanonakUri (publisher, package_, name, version)
            //
            // The concrete object depends on the statement subclass:
            if (stmt instanceof StringStatement) {
              console.log('  literal', stmt.predicate.subject.name, '=', stmt.object);
            } else if (stmt instanceof ReferenceStatement) {
              console.log('  ref', stmt.predicate.subject.name, '->', stmt.object.subject.toString());
            } else if (stmt instanceof ListStatement) {
              console.log('  list', stmt.predicate.subject.name, 'len=', stmt.object.length);
            }
          }
        }
        ```

        Two rules that prevent the most common consumer bugs:

        1. **Compare identity by URI, not by string shape.** Each
           statement's predicate has a `subject: KanonakUri` with
           `publisher`, `package_`, `name`, `version` fields. Compare
           against those. Do not strip alias prefixes off raw YAML
           keys, do not use `endsWith('.Class')`, do not invent a
           local-name heuristic.
        2. **Read property values by walking statements**, not by
           accessing the raw dict. The dict is alias-dependent; the
           statement list is canonical.

    - title: GraphBuilder API
      body: |
        `GraphBuilder` is the visualization entry point. It produces
        a `GraphData` value that maps cleanly to any node/edge graph
        library.

        ```ts
        import { GraphBuilder, GraphData } from '@kanonak-protocol/sdk';

        const graph: GraphData = await GraphBuilder.buildFromRepository(repo);
        // graph.nodes: GraphNode[]
        // graph.edges: GraphEdge[]
        ```

        Two static methods, used in different situations:

        - **`buildFromRepository(repo)`** â€” async. Parses every
          document the repository can produce, resolves imports,
          classifies every entity, and builds nodes + edges across
          the entire transitive closure. This is what you want for a
          full ontology browser or any view that needs to see edges
          crossing package boundaries.

        - **`buildFromDocument(doc)`** â€” sync. Builds nodes + edges
          from one already-parsed `KanonakDocument` only. Edges
          referencing entities in OTHER documents are filtered out.
          This is the lightweight option when you want to render a
          single package without dragging its imports in.

        Use `buildFromRepository` if you might link to imported
        types; use `buildFromDocument` if you only want the local
        package's structure.

    - title: GraphNode and GraphEdge shapes
      body: |
        Every node has the same shape:

        ```ts
        interface GraphNode {
          id: string;        // "publisher/package/name@version" or local name
          label: string;     // display label (entity rdfs:label or name)
          type: NodeType;    // semantic classification (see below)
          namespace: string; // "publisher/package" of the source document
          properties: Record<string, unknown>; // scalar key/values for tooltips
        }

        enum NodeType {
          Class              = 'Class',
          ObjectProperty     = 'ObjectProperty',
          DatatypeProperty   = 'DatatypeProperty',
          AnnotationProperty = 'AnnotationProperty',
          Instance           = 'Instance',
          Datatype           = 'Datatype',
          Unknown            = 'Unknown',
        }
        ```

        Every edge has the same shape:

        ```ts
        interface GraphEdge {
          source: string;     // node id
          target: string;     // node id
          type: EdgeType;
          label: string;      // display label
          propertyId?: string; // canonical URI of the property entity
                               // that defines this relationship, if any
        }

        enum EdgeType {
          InstanceOf         = 'instanceOf',         // Instance -> Class
          SubClassOf         = 'subClassOf',         // Class -> Class
          SubPropertyOf      = 'subPropertyOf',      // Property -> Property
          Domain             = 'domain',             // Property -> Class
          Range              = 'range',              // Property -> Class/Datatype
          ObjectRelationship = 'objectRelationship', // Class -> Class via property
          PropertyValue      = 'propertyValue',      // Instance -> value via property
        }
        ```

        Two notes that change how you draw the graph:

        1. **`ObjectRelationship` edges go directly between Domain
           and Range classes**, with the property's name as the edge
           label and `propertyId` set to the property entity's URI.
           This is intentional - you do NOT also get separate
           `Domain` and `Range` edges for the same property.
           Click-to-inspect-property is supported via `propertyId`.
        2. **`PropertyValue` edges go from instances to whatever the
           ObjectProperty value points at.** Their `propertyId` field
           is the URI of the ObjectProperty that defines the
           relationship - useful for clickable edges in your UI.

    - title: Building a graph end to end (Node)
      body: |
        Full Node example: load every `.kan.yml` file from a directory,
        build the graph, dump it to JSON.

        ```ts
        import {
          KanonakParser,
          GraphBuilder,
          FileSystemKanonakDocumentRepository,
        } from '@kanonak-protocol/sdk';
        import { writeFileSync } from 'node:fs';

        const parser = new KanonakParser();
        const repo = new FileSystemKanonakDocumentRepository(
          '/path/to/packages',
          true,
          parser,
        );

        const graph = await GraphBuilder.buildFromRepository(repo);
        writeFileSync('graph.json', JSON.stringify(graph, null, 2));
        console.log(`Built graph: ${graph.nodes.length} nodes, ${graph.edges.length} edges`);
        ```

    - title: Building a graph end to end (browser)
      body: |
        Full browser example: fetch a single package over HTTP from
        kanonak.org, parse it, build a graph, and pass it to a
        visualization library.

        ```ts
        import {
          KanonakParser,
          KanonakObjectParser,
          GraphBuilder,
          InMemoryKanonakDocumentRepository,
          HttpKanonakDocumentRepository,
        } from '@kanonak-protocol/sdk/browser';

        // 1. Build a local-first repo: in-memory for the package we
        //    already have, HTTP for everything its imports reference.
        const parser = new KanonakParser();
        const inMemory = new InMemoryKanonakDocumentRepository(parser);

        // Fetch the package the user wants to view
        const res = await fetch('https://kanonak.org/agent-skills/1.0.0.kan.yml');
        const yamlText = await res.text();
        const doc = parser.parse(yamlText);
        await inMemory.saveDocumentAsync(
          doc,
          `${doc.metadata.namespace_?.publisher}/${doc.metadata.namespace_?.package_}@1.0.0`,
        );

        // 2. Build the graph against the in-memory repo. (For
        //    transitive imports, you'd compose a custom IKanonakDocumentRepository
        //    that falls back to HttpKanonakDocumentRepository - see
        //    the next section.)
        const graph = await GraphBuilder.buildFromRepository(inMemory);

        // 3. Hand off to your visualization library.
        renderGraph(graph);
        ```

        For most browser apps you will want a composite repository
        that tries an in-memory cache first, then HTTP. The SDK does
        not ship a `LocalFirstRepository` in the browser bundle, so
        write a thin wrapper:

        ```ts
        class LocalFirst implements IKanonakDocumentRepository {
          constructor(
            private inMemory: InMemoryKanonakDocumentRepository,
            private http: HttpKanonakDocumentRepository,
          ) {}
          async getAllDocumentsAsync() { return this.inMemory.getAllDocumentsAsync(); }
          async getHighestCompatibleVersionAsync(pub, imp) {
            return (await this.inMemory.getHighestCompatibleVersionAsync(pub, imp))
                ?? (await this.http.getHighestCompatibleVersionAsync(pub, imp));
          }
          // ... delegate the rest similarly
        }
        ```

    - title: Wiring GraphData into visualization libraries
      body: |
        The `GraphData` shape is deliberately library-agnostic. Quick
        adapters for the popular ones:

        **Cytoscape.js**

        ```ts
        const elements = [
          ...graph.nodes.map(n => ({ data: { id: n.id, label: n.label, type: n.type } })),
          ...graph.edges.map(e => ({ data: { source: e.source, target: e.target, label: e.label, type: e.type } })),
        ];
        const cy = cytoscape({ container, elements, style: ..., layout: ... });
        ```

        **vis-network**

        ```ts
        import { Network, DataSet } from 'vis-network/standalone';
        const nodes = new DataSet(graph.nodes.map(n => ({
          id: n.id, label: n.label, group: n.type,
        })));
        const edges = new DataSet(graph.edges.map(e => ({
          from: e.source, to: e.target, label: e.label, arrows: 'to',
        })));
        const network = new Network(container, { nodes, edges }, options);
        ```

        **D3 force layout**

        ```ts
        import { forceSimulation, forceLink, forceManyBody, forceCenter } from 'd3-force';
        const sim = forceSimulation(graph.nodes)
          .force('link', forceLink(graph.edges).id(d => d.id).distance(80))
          .force('charge', forceManyBody().strength(-200))
          .force('center', forceCenter(width / 2, height / 2));
        ```

        Across all three libraries the mapping is the same:
        `GraphNode.id` is the canonical identifier; `GraphNode.type`
        gives you a per-type stylable group; `GraphEdge.source` and
        `GraphEdge.target` are graph node ids; `GraphEdge.type`
        drives edge styling. Use `propertyId` on edges to make edges
        clickable and look up the property entity in your node
        index.

    - title: Pitfalls and gotchas
      body: |
        - **Do not import from `@kanonak-protocol/sdk` in a browser
          bundle.** It pulls in `node:fs` and `node:path`. Use the
          `/browser` entry point.
        - **Do not interpret raw YAML keys.** A document author can
          write `cap.Capability` or `Capability` for the same entity
          depending on imports â€” the canonical form is the
          `KanonakUri` you get from the parser. Compare URIs.
        - **Do not key dispatch tables by local entity names.** Two
          different packages can both define a class called `Foo`.
          Keying by `publisher/package/name` is unambiguous; keying
          by `Foo` is not.
        - **`GraphBuilder.buildFromDocument` filters out cross-package
          edges.** If you see fewer edges than expected, switch to
          `buildFromRepository` so the imported documents are part
          of the graph.
        - **Embedded objects show up as synthetic nodes.** Anonymous
          inline objects under an ObjectProperty become
          `Instance`-typed nodes whose id is `${parentId}/${propertyKey}`.
          Style them differently if they would otherwise crowd your
          graph.
        - **Use the SDK's classification helpers (`ResourceTypeClassifier`)
          for any type check beyond what the GraphBuilder already
          does for you.** Do not re-implement type detection by
          string matching.
