
protocols:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

Protocol:
  type: rdfs.Class
  label: Protocol
  comment: A protocol - a named set of conventions governing how a system is used or implemented

Convention:
  type: rdfs.Class
  label: Convention
  comment: A named grouping of rules and examples covering one aspect of a protocol

Rule:
  type: rdfs.Class
  label: Rule
  comment: A statement governing how an aspect of a protocol should be followed

RequiredRule:
  type: rdfs.Class
  label: Required Rule
  comment: A rule that MUST be followed
  subClassOf: Rule

RecommendedRule:
  type: rdfs.Class
  label: Recommended Rule
  comment: A rule that SHOULD be followed
  subClassOf: Rule

ForbiddenRule:
  type: rdfs.Class
  label: Forbidden Rule
  comment: A rule that MUST NOT be followed
  subClassOf: Rule

Example:
  type: rdfs.Class
  label: Example
  comment: A concrete example illustrating a convention

ValidExample:
  type: rdfs.Class
  label: Valid Example
  comment: An example that conforms to a convention
  subClassOf: Example

InvalidExample:
  type: rdfs.Class
  label: Invalid Example
  comment: An example that violates a convention
  subClassOf: Example

Steward:
  type: rdfs.Class
  label: Steward
  comment: An organization or body that governs, maintains, or sponsors a protocol

ProtocolLayer:
  type: rdfs.Class
  label: Protocol Layer
  comment: A layer in the agentic protocol stack describing what role a protocol plays (tool access, agent-to-agent communication, discovery, guidance, governance)

hasConvention:
  type: owl.ObjectProperty
  label: Has Convention
  comment: Links a protocol to a convention it defines
  domain: Protocol
  range: Convention

summary:
  type: owl.DatatypeProperty
  label: Summary
  comment: Brief description of what this convention covers
  domain: Convention
  range: xsd.string

hasRequiredRule:
  type: owl.ObjectProperty
  label: Has Required Rule
  comment: A required rule (MUST) that is part of this convention
  domain: Convention
  range: RequiredRule

hasRecommendedRule:
  type: owl.ObjectProperty
  label: Has Recommended Rule
  comment: A recommended rule (SHOULD) that is part of this convention
  domain: Convention
  range: RecommendedRule

hasForbiddenRule:
  type: owl.ObjectProperty
  label: Has Forbidden Rule
  comment: A forbidden rule (MUST NOT) that is part of this convention
  domain: Convention
  range: ForbiddenRule

hasValidExample:
  type: owl.ObjectProperty
  label: Has Valid Example
  comment: A valid example illustrating conformance to this convention
  domain: Convention
  range: ValidExample

hasInvalidExample:
  type: owl.ObjectProperty
  label: Has Invalid Example
  comment: An invalid example illustrating a violation of this convention
  domain: Convention
  range: InvalidExample

text:
  type: owl.DatatypeProperty
  label: Text
  comment: The normative text of the rule
  domain: Rule
  range: xsd.string

rationale:
  type: owl.DatatypeProperty
  label: Rationale
  comment: The reasoning behind the rule
  domain: Rule
  range: xsd.string

value:
  type: owl.DatatypeProperty
  label: Value
  comment: The literal value demonstrated by the example
  domain: Example
  range: xsd.string

description:
  type: owl.DatatypeProperty
  label: Description
  comment: Explanation of what the example demonstrates
  domain: Example
  range: xsd.string

stewardName:
  type: owl.DatatypeProperty
  label: Steward Name
  comment: The human-readable name of a steward organization
  domain: Steward
  range: xsd.string

stewardUrl:
  type: owl.DatatypeProperty
  label: Steward URL
  comment: The primary public URL for a steward organization
  domain: Steward
  range: xsd.string

layerName:
  type: owl.DatatypeProperty
  label: Layer Name
  comment: The human-readable name of a protocol layer in the agentic stack
  domain: ProtocolLayer
  range: xsd.string

steward:
  type: owl.ObjectProperty
  label: Steward
  comment: >
    Links a protocol to the organization that governs or maintains it.
    Accepts either a single Steward reference or a YAML list of Steward
    references when a protocol is jointly governed - for example, A2A is
    jointly stewarded by Google and the Linux Foundation, and ACP is
    jointly stewarded by Zed Industries and JetBrains.
  domain: Protocol
  range: Steward

layer:
  type: owl.ObjectProperty
  label: Layer
  comment: Links a protocol to the layer of the agentic stack it occupies
  domain: Protocol
  range: ProtocolLayer

specificationUrl:
  type: owl.DatatypeProperty
  label: Specification URL
  comment: A URL pointing to the canonical specification for the protocol
  domain: Protocol
  range: xsd.string

createdDate:
  type: owl.DatatypeProperty
  label: Created Date
  comment: ISO date (yyyy-mm-dd) on which the protocol was first published
  domain: Protocol
  range: xsd.string

supersededBy:
  type: owl.ObjectProperty
  label: Superseded By
  comment: Links a protocol to a successor protocol that replaces it
  domain: Protocol
  range: Protocol

mergedInto:
  type: owl.ObjectProperty
  label: Merged Into
  comment: Links a protocol to another protocol that absorbed it
  domain: Protocol
  range: Protocol

complements:
  type: owl.ObjectProperty
  label: Complements
  comment: Links a protocol to another protocol it is designed to work alongside
  domain: Protocol
  range: Protocol

anthropic:
  type: Steward
  stewardName: Anthropic
  stewardUrl: https://www.anthropic.com

google:
  type: Steward
  stewardName: Google
  stewardUrl: https://ai.google

openai:
  type: Steward
  stewardName: OpenAI
  stewardUrl: https://openai.com

linux-foundation:
  type: Steward
  stewardName: Linux Foundation
  stewardUrl: https://www.linuxfoundation.org

aaif:
  type: Steward
  stewardName: Agentic AI Foundation
  stewardUrl: https://www.linuxfoundation.org/projects/agentic-ai-foundation

w3c-cg:
  type: Steward
  stewardName: W3C Community Group
  stewardUrl: https://www.w3.org/community

cisco:
  type: Steward
  stewardName: Cisco
  stewardUrl: https://www.cisco.com

nist-caisi:
  type: Steward
  stewardName: NIST Center for AI Standards and Innovation
  stewardUrl: https://www.nist.gov/aisi

zed-industries:
  type: Steward
  stewardName: Zed Industries
  stewardUrl: https://zed.dev

jetbrains:
  type: Steward
  stewardName: JetBrains
  stewardUrl: https://www.jetbrains.com

tool-layer:
  type: ProtocolLayer
  layerName: Tool Layer

communication-layer:
  type: ProtocolLayer
  layerName: Communication Layer

discovery-layer:
  type: ProtocolLayer
  layerName: Discovery Layer

integration-layer:
  type: ProtocolLayer
  layerName: Integration Layer

guidance-layer:
  type: ProtocolLayer
  layerName: Guidance Layer

governance-layer:
  type: ProtocolLayer
  layerName: Governance Layer
