# =============================================================================
# core-owl @ 2.1.0
#
# Additive minor release that completes the OWL 2 vocabulary against
# the W3C OWL 2 RDF-Based Semantics specification. Every entity that
# existed in 2.0.0 is preserved bit-for-bit. Consumers pinned to
# ^2.0.0 see the additions automatically.
#
# Newly declared in 2.1.0:
#
#   N-ary axioms (W3C OWL 2 §9):
#     AllDifferent, AllDisjointClasses, AllDisjointProperties, members
#
#   Property chain + key axioms (W3C OWL 2 §9.2.1, §9.5):
#     propertyChainAxiom, hasKey
#
#   Class-expression extensions:
#     hasSelf, disjointUnionOf
#
#   Negative property assertions (W3C OWL 2 §9.6.2):
#     NegativePropertyAssertion, sourceIndividual, assertionProperty,
#     targetIndividual, targetValue
#
#   Axiom-level annotations (W3C OWL 2 §9.7):
#     Axiom, Annotation, annotatedSource, annotatedProperty,
#     annotatedTarget
#
#   Top / bottom built-in properties:
#     topObjectProperty, bottomObjectProperty,
#     topDataProperty,   bottomDataProperty
#
#   Ontology versioning:
#     versionIRI
#
# All additions track the canonical OWL 2 IRIs:
#   owl:  http://www.w3.org/2002/07/owl#
#
# Reference specs:
#   https://www.w3.org/TR/owl2-overview/
#   https://www.w3.org/TR/owl2-syntax/
#   https://www.w3.org/TR/owl2-rdf-based-semantics/
# =============================================================================

# Package declaration
core-owl:
  type: Package
  publisher: kanonak.org
  version: 2.1.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
        - package: core-xsd
          match: ^
          version: 1.0.0

# Core OWL Classes

Class:
  type: Class
  label: Class
  comment: The class of all OWL classes
  subClassOf: Class

Thing:
  type: Class
  label: Thing
  comment: The class of all individuals
  subClassOf: Resource

Nothing:
  type: Class
  label: Nothing
  comment: The empty class
  subClassOf: Thing

Ontology:
  type: Class
  label: Ontology
  comment: The class of ontologies
  subClassOf: Resource

# Property Classes

ObjectProperty:
  type: Class
  label: Object Property
  comment: The class of object properties that relate individuals to individuals
  subClassOf: Property

DatatypeProperty:
  type: Class
  label: Datatype Property
  comment: The class of datatype properties that relate individuals to data values
  subClassOf: Property

AnnotationProperty:
  type: Class
  label: Annotation Property
  comment: The class of annotation properties
  subClassOf: Property

# Property Characteristic Classes

FunctionalProperty:
  type: Class
  label: Functional Property
  comment: The class of properties that can have at most one value for each individual
  subClassOf: Property

InverseFunctionalProperty:
  type: Class
  label: Inverse Functional Property
  comment: The class of properties that are inverse functional
  subClassOf: ObjectProperty

TransitiveProperty:
  type: Class
  label: Transitive Property
  comment: The class of transitive properties
  subClassOf: ObjectProperty

SymmetricProperty:
  type: Class
  label: Symmetric Property
  comment: The class of symmetric properties
  subClassOf: ObjectProperty

AsymmetricProperty:
  type: Class
  label: Asymmetric Property
  comment: The class of asymmetric properties
  subClassOf: ObjectProperty

ReflexiveProperty:
  type: Class
  label: Reflexive Property
  comment: The class of reflexive properties
  subClassOf: ObjectProperty

IrreflexiveProperty:
  type: Class
  label: Irreflexive Property
  comment: The class of irreflexive properties
  subClassOf: ObjectProperty

# Class Expression Classes

Restriction:
  type: Class
  label: Restriction
  comment: The class of property restrictions
  subClassOf: Class

DataRange:
  type: Class
  label: Data Range
  comment: The class of OWL data ranges
  subClassOf: Datatype

# Deprecated Classes

DeprecatedClass:
  type: Class
  label: Deprecated Class
  comment: The class of deprecated classes
  subClassOf: Class

DeprecatedProperty:
  type: Class
  label: Deprecated Property
  comment: The class of deprecated properties
  subClassOf: Property

# Individual Classes

NamedIndividual:
  type: Class
  label: Named Individual
  comment: The class of named individuals
  subClassOf: Thing

# OWL Properties

# Restriction Properties

onProperty:
  type: ObjectProperty
  label: On Property
  comment: The property that determines the property that a restriction refers to
  domain: Restriction
  range: Property

onClass:
  type: ObjectProperty
  label: On Class
  comment: The property that determines the class that a qualified restriction refers to
  domain: Restriction
  range: Class

onDataRange:
  type: ObjectProperty
  label: On Data Range
  comment: The property that determines the data range that a qualified restriction refers to
  domain: Restriction
  range: DataRange

# Cardinality Properties

cardinality:
  type: DatatypeProperty
  label: Cardinality
  comment: The property that determines the exact cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

minCardinality:
  type: DatatypeProperty
  label: Min Cardinality
  comment: The property that determines the minimum cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

maxCardinality:
  type: DatatypeProperty
  label: Max Cardinality
  comment: The property that determines the maximum cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

qualifiedCardinality:
  type: DatatypeProperty
  label: Qualified Cardinality
  comment: The property that determines the exact qualified cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

minQualifiedCardinality:
  type: DatatypeProperty
  label: Min Qualified Cardinality
  comment: The property that determines the minimum qualified cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

maxQualifiedCardinality:
  type: DatatypeProperty
  label: Max Qualified Cardinality
  comment: The property that determines the maximum qualified cardinality of a restriction
  domain: Restriction
  range: nonNegativeInteger

# Value Restriction Properties

hasValue:
  type: ObjectProperty
  label: Has Value
  comment: The property that determines the individual value that a restriction refers to
  domain: Restriction
  range: Resource

allValuesFrom:
  type: ObjectProperty
  label: All Values From
  comment: The property that determines the class that all values of a property must belong to
  domain: Restriction
  range: Class

someValuesFrom:
  type: ObjectProperty
  label: Some Values From
  comment: The property that determines the class that at least one value of a property must belong to
  domain: Restriction
  range: Class

# Property Relationship Properties

equivalentProperty:
  type: ObjectProperty
  label: Equivalent Property
  comment: The property for declaring two properties as equivalent
  domain: Property
  range: Property

inverseOf:
  type: ObjectProperty
  label: Inverse Of
  comment: The property for specifying inverse properties
  domain: ObjectProperty
  range: ObjectProperty

propertyDisjointWith:
  type: ObjectProperty
  label: Property Disjoint With
  comment: The property for declaring two properties as disjoint
  domain: Property
  range: Property

# Class Relationship Properties

equivalentClass:
  type: ObjectProperty
  label: Equivalent Class
  comment: The property for declaring two classes as equivalent
  domain: Class
  range: Class

disjointWith:
  type: ObjectProperty
  label: Disjoint With
  comment: The property for declaring two classes as disjoint
  domain: Class
  range: Class

complementOf:
  type: ObjectProperty
  label: Complement Of
  comment: The property for specifying class complements
  domain: Class
  range: Class

unionOf:
  type: ObjectProperty
  label: Union Of
  comment: The property for defining a class as a union of other classes
  domain: Class
  range: List

intersectionOf:
  type: ObjectProperty
  label: Intersection Of
  comment: The property for defining a class as an intersection of other classes
  domain: Class
  range: List

oneOf:
  type: ObjectProperty
  label: One Of
  comment: The property for defining a class by enumeration of its individuals
  domain: Class
  range: List

# Individual Properties

sameAs:
  type: ObjectProperty
  label: Same As
  comment: The property for declaring two individuals as identical
  domain: Thing
  range: Thing

differentFrom:
  type: ObjectProperty
  label: Different From
  comment: The property for declaring two individuals as distinct
  domain: Thing
  range: Thing

distinctMembers:
  type: ObjectProperty
  label: Distinct Members
  comment: The property for declaring a list of pairwise different individuals
  domain: Class
  range: List

# Versioning Properties

versionInfo:
  type: AnnotationProperty
  label: Version Info
  comment: Provides version information for an ontology or resource
  domain: Resource
  range: string

priorVersion:
  type: ObjectProperty
  label: Prior Version
  comment: References a prior version of an ontology
  domain: Ontology
  range: Ontology

backwardCompatibleWith:
  type: ObjectProperty
  label: Backward Compatible With
  comment: References an ontology that this version is backward compatible with
  domain: Ontology
  range: Ontology

incompatibleWith:
  type: ObjectProperty
  label: Incompatible With
  comment: References an ontology that this version is incompatible with
  domain: Ontology
  range: Ontology

deprecated:
  type: AnnotationProperty
  label: Deprecated
  comment: Indicates that a resource is deprecated
  domain: Resource
  range: boolean

# Ontology Properties

owlImports:
  type: ObjectProperty
  label: Imports
  comment: References an ontology to be imported
  domain: Ontology
  range: Ontology

versionIRI:
  type: ObjectProperty
  label: Version IRI
  comment: >
    The version-specific IRI of an ontology. Companion to the ontology
    IRI: the ontology IRI is stable across versions, the versionIRI
    identifies the specific release. Mirrors `owl:versionIRI`.
  domain: Ontology
  range: Ontology

# =============================================================================
# N-ary axiom support (new in 2.1.0).
#
# OWL 2 ships pairwise binary forms (`differentFrom`, `disjointWith`,
# `propertyDisjointWith`) plus n-ary container forms that scale up to
# arbitrary list lengths. The container forms use the `members`
# property to carry an `rdf:List` of participants.
# =============================================================================

AllDifferent:
  type: Class
  label: All Different
  comment: >
    The class of axioms asserting that every member of a list of
    individuals is pairwise different from every other member. More
    compact than enumerating O(n^2) `differentFrom` triples for large
    sets. Mirrors `owl:AllDifferent`.
  subClassOf: Resource

AllDisjointClasses:
  type: Class
  label: All Disjoint Classes
  comment: >
    The class of axioms asserting pairwise disjointness over a list
    of classes. The n-ary counterpart of `disjointWith`. Mirrors
    `owl:AllDisjointClasses`.
  subClassOf: Resource

AllDisjointProperties:
  type: Class
  label: All Disjoint Properties
  comment: >
    The class of axioms asserting pairwise property-disjointness over
    a list of properties. The n-ary counterpart of
    `propertyDisjointWith`. Mirrors `owl:AllDisjointProperties`.
  subClassOf: Resource

members:
  type: ObjectProperty
  label: Members
  comment: >
    Carries the list of participants for an n-ary axiom — a
    `distinctMembers`/`AllDifferent`, `AllDisjointClasses`, or
    `AllDisjointProperties` instance. The value is an `rdf:List` whose
    elements are the participating individuals, classes, or properties.
    Mirrors `owl:members`.
  domain: Resource
  range: List

# =============================================================================
# Property chain + key axioms (new in 2.1.0).
# =============================================================================

propertyChainAxiom:
  type: ObjectProperty
  label: Property Chain Axiom
  comment: >
    Declares that an ObjectProperty is the composition of a chain of
    other ObjectProperties — e.g. `hasParent o hasParent ⊑ hasGrandparent`.
    The value is an `rdf:List` of the chained properties, ordered.
    Foundational for OWL 2 reasoning beyond simple subPropertyOf.
    Mirrors `owl:propertyChainAxiom`.
  domain: ObjectProperty
  range: List

hasKey:
  type: ObjectProperty
  label: Has Key
  comment: >
    Declares that the listed properties (an `rdf:List` of
    ObjectProperty / DatatypeProperty values) jointly identify
    individuals of the subject class — i.e. two individuals of the
    class with the same values across all listed properties are the
    same individual. Mirrors `owl:hasKey`.
  domain: Class
  range: List

# =============================================================================
# Class-expression extensions (new in 2.1.0).
# =============================================================================

hasSelf:
  type: DatatypeProperty
  label: Has Self
  comment: >
    Used inside an `owl:Restriction` whose `onProperty` value is an
    `ObjectProperty`. The boolean literal asserts the restriction
    matches individuals related to themselves through the property.
    Mirrors `owl:hasSelf`.
  domain: Restriction
  range: boolean

disjointUnionOf:
  type: ObjectProperty
  label: Disjoint Union Of
  comment: >
    Declares the subject class as the disjoint union of the listed
    classes — i.e. equivalent to their `unionOf` AND every pair of
    listed classes is `disjointWith`. The value is an `rdf:List` of
    classes. Mirrors `owl:disjointUnionOf`.
  domain: Class
  range: List

# =============================================================================
# Negative property assertions (new in 2.1.0).
#
# An OWL 2 NegativePropertyAssertion declares that a specific subject
# does NOT relate to a specific target through a specific property.
# Encoded as a four-property reified node:
#
#   _:a rdf:type           owl:NegativePropertyAssertion
#   _:a owl:sourceIndividual <s>
#   _:a owl:assertionProperty <p>
#   _:a owl:targetIndividual <o>     # for ObjectProperty assertions
#   -or-
#   _:a owl:targetValue       <lit>  # for DatatypeProperty assertions
# =============================================================================

NegativePropertyAssertion:
  type: Class
  label: Negative Property Assertion
  comment: >
    The class of negative property assertions. A reification node
    declaring that `(sourceIndividual, assertionProperty,
    targetIndividual|targetValue)` does NOT hold. Mirrors
    `owl:NegativePropertyAssertion`.
  subClassOf: Resource

sourceIndividual:
  type: ObjectProperty
  label: Source Individual
  comment: >
    The subject of a negative property assertion. Mirrors
    `owl:sourceIndividual`.
  domain: NegativePropertyAssertion
  range: Thing

assertionProperty:
  type: ObjectProperty
  label: Assertion Property
  comment: >
    The property whose assertion is being negated. Mirrors
    `owl:assertionProperty`.
  domain: NegativePropertyAssertion
  range: Property

targetIndividual:
  type: ObjectProperty
  label: Target Individual
  comment: >
    The object of a negative ObjectProperty assertion. Use with
    ObjectProperty `assertionProperty` values; for DatatypeProperty
    assertions use `targetValue` instead. Mirrors
    `owl:targetIndividual`.
  domain: NegativePropertyAssertion
  range: Thing

targetValue:
  type: DatatypeProperty
  label: Target Value
  comment: >
    The literal value of a negative DatatypeProperty assertion.
    Mirrors `owl:targetValue`.
  domain: NegativePropertyAssertion
  range: Literal

# =============================================================================
# Axiom-level annotations (new in 2.1.0).
#
# OWL 2 lets authors attach annotations (provenance, comments, etc.)
# to individual axioms, not just to entities. The mechanism reifies an
# axiom as an `owl:Axiom` node carrying the s/p/o triple plus
# annotation properties.
# =============================================================================

Axiom:
  type: Class
  label: Axiom
  comment: >
    The class of reified axioms. Used to attach annotations
    (provenance, deprecation, etc.) to a specific axiom rather than
    to one of its entities. Mirrors `owl:Axiom`.
  subClassOf: Resource

Annotation:
  type: Class
  label: Annotation
  comment: >
    The class of annotation reifications — used when an annotation
    itself needs to be annotated (e.g. recording the source of an
    rdfs:label). Mirrors `owl:Annotation`.
  subClassOf: Resource

annotatedSource:
  type: ObjectProperty
  label: Annotated Source
  comment: >
    The subject of the axiom being annotated. Mirrors
    `owl:annotatedSource`.
  domain: Resource
  range: Resource

annotatedProperty:
  type: ObjectProperty
  label: Annotated Property
  comment: >
    The predicate of the axiom being annotated. Mirrors
    `owl:annotatedProperty`.
  domain: Resource
  range: Property

annotatedTarget:
  type: ObjectProperty
  label: Annotated Target
  comment: >
    The object of the axiom being annotated. May be either a Resource
    or a Literal — `Resource` is the upper bound covering both.
    Mirrors `owl:annotatedTarget`.
  domain: Resource
  range: Resource

# =============================================================================
# Top / bottom built-in properties (new in 2.1.0).
#
# Universal and empty properties — useful as endpoints in property
# hierarchies and as targets when an OWL 2 reasoner needs to declare
# a property has no instances.
# =============================================================================

topObjectProperty:
  type: ObjectProperty
  label: Top Object Property
  comment: >
    The universal ObjectProperty — relates every pair of individuals.
    Every ObjectProperty is a sub-property of this. Mirrors
    `owl:topObjectProperty`.
  domain: Thing
  range: Thing

bottomObjectProperty:
  type: ObjectProperty
  label: Bottom Object Property
  comment: >
    The empty ObjectProperty — relates no individuals. Every
    ObjectProperty has this as a sub-property. Mirrors
    `owl:bottomObjectProperty`.
  domain: Thing
  range: Thing

topDataProperty:
  type: DatatypeProperty
  label: Top Data Property
  comment: >
    The universal DatatypeProperty — relates every individual to every
    literal. Every DatatypeProperty is a sub-property of this.
    Mirrors `owl:topDataProperty`.
  domain: Thing
  range: Literal

bottomDataProperty:
  type: DatatypeProperty
  label: Bottom Data Property
  comment: >
    The empty DatatypeProperty — relates no individuals to any
    literal. Every DatatypeProperty has this as a sub-property.
    Mirrors `owl:bottomDataProperty`.
  domain: Thing
  range: Literal
