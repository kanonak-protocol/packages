# =============================================================================
# formats @ 1.2.0
#
# Canonical names for derivation target formats. A `Format` is the
# *what* a Kanonak resource can be derived into — `html`, `markdown`,
# `typescript`, etc.
#
# Each Format carries:
#   - mediaType:           IANA media type for HTTP / file-system identification.
#   - fileExtension:       Conventional extension (with leading dot) for
#                          artifact filenames. Optional.
#   - latestUrlBehavior:   How a server should respond to a latest-form URL
#                          (e.g. `/snapshot/view` without a pinned version).
#                          See below.
#
# -----------------------------------------------------------------------------
# 1.2.0 — additive minor bump. Introduces `latestUrlBehavior` and
# annotates every Format instance:
#
#   - human-facing formats (html, svg, stylesheet) → "serve"
#     The server returns the latest content directly at the latest URL.
#     Users bookmark and share the latest URL as a stable handle.
#
#   - machine-facing formats (markdown, json, yaml, xml, typescript,
#     c-sharp, rust, python, dynamodb-json) → "redirect"
#     The server returns a 302 to the pinned URL, so automated
#     consumers (AI agents, importers) always know exactly which
#     version they received.
#
# This distinction is content-aware behavior the protocol owns rather
# than each publisher reinventing. Static publishers emit redirect
# files (`_redirects`, `.htaccess`, meta-refresh HTML) for machine
# formats; dynamic servers return HTTP 302s.
#
# 1.0.0 and 1.1.0 preserved on disk archivally.
# =============================================================================

formats:
  type: Package
  publisher: kanonak.org
  version: 1.2.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

# =============================================================================
# CLASSES
# =============================================================================

Format:
  type: rdfs.Class
  label: Format
  comment: >-
    A canonical name for a derivation target format. Instances of
    Format are referenced by `derivations.Derivation.format` to
    declare what kind of artifact a transformation produces.

LatestUrlBehavior:
  type: rdfs.Class
  label: Latest URL Behavior
  comment: >-
    How a server should respond when an unversioned (latest-form)
    URL of this format is requested. Two canonical instances:
    `serve` (return latest content directly) and `redirect` (302 to
    the pinned URL). Format instances declare their behavior via
    the `latestUrlBehavior` property.

# =============================================================================
# PROPERTIES
# =============================================================================

mediaType:
  type: owl.DatatypeProperty
  domain: Format
  range: xsd.string
  label: Media Type
  comment: >-
    IANA media type for this format (e.g. `text/html`, `application/json`).
    Used by runtimes to set Content-Type headers and by file-system
    consumers to choose viewers.

fileExtension:
  type: owl.DatatypeProperty
  domain: Format
  range: xsd.string
  label: File Extension
  comment: >-
    Conventional file extension including the leading dot (e.g.
    `.html`, `.ts`). Optional — some formats are embedded rather than
    persisted as files.

latestUrlBehavior:
  type: owl.ObjectProperty
  domain: Format
  range: LatestUrlBehavior
  label: Latest URL Behavior
  comment: >-
    How a server should respond to a latest-form URL of this format.
    `serve` for human-facing formats — return latest content at the
    latest URL, so users can bookmark and share. `redirect` for
    machine-facing formats — return 302 to the pinned URL so the
    client knows exactly which version it received.

# =============================================================================
# LATEST URL BEHAVIOR INSTANCES
# =============================================================================

serve:
  type: LatestUrlBehavior
  label: Serve
  comment: >-
    Return the latest content at the latest URL directly. The URL
    the user sees and bookmarks is the latest-form. Appropriate for
    human-facing formats (HTML, SVG, stylesheets) where the URL is
    a stable handle the user keeps.

redirect:
  type: LatestUrlBehavior
  label: Redirect
  comment: >-
    Return an HTTP 302 redirect to the pinned (exact-version) URL.
    The latest-form URL is a redirect, never a content URL. Appropriate
    for machine-facing formats (Markdown, JSON, YAML, programming
    languages) where the consumer needs to know exactly which version
    it fetched.

# =============================================================================
# CANONICAL FORMAT INSTANCES
#
# Authors targeting these formats reference them as
# `formats.html`, `formats.markdown`, etc. via the import alias.
# =============================================================================

html:
  type: Format
  label: HTML
  mediaType: text/html
  fileExtension: .html
  latestUrlBehavior: serve

stylesheet:
  type: Format
  label: Stylesheet
  mediaType: text/css
  fileExtension: .css
  latestUrlBehavior: serve
  comment: >-
    CSS stylesheet — a separate derivable artifact alongside the
    structural HTML output. universal-look binds a baseline
    stylesheet derivation at (formats.stylesheet, default) on
    rdfs.Resource so every Kanonak Browser implementation gets the
    same look out of the box. Publishers override at any class level
    for per-class branding; users publish a personal-theme package
    that augments rdfs.Resource for global theming.

markdown:
  type: Format
  label: Markdown
  mediaType: text/markdown
  fileExtension: .md
  latestUrlBehavior: redirect

json:
  type: Format
  label: JSON
  mediaType: application/json
  fileExtension: .json
  latestUrlBehavior: redirect

dynamodb-json:
  type: Format
  label: DynamoDB JSON
  mediaType: application/json
  fileExtension: .json
  latestUrlBehavior: redirect
  comment: >-
    DynamoDB attribute-value JSON — the `{ "S": … } / { "N": … } /
    { "M": … } / { "L": … }` dialect consumed by `PutItem` /
    `BatchWriteItem` and the CloudFormation / CDK item syntax. A
    serialization dialect of JSON (same media type and extension),
    not a database client.

yaml:
  type: Format
  label: YAML
  mediaType: application/yaml
  fileExtension: .yaml
  latestUrlBehavior: redirect

xml:
  type: Format
  label: XML
  mediaType: application/xml
  fileExtension: .xml
  latestUrlBehavior: redirect

svg:
  type: Format
  label: SVG
  mediaType: image/svg+xml
  fileExtension: .svg
  latestUrlBehavior: serve

typescript:
  type: Format
  label: TypeScript
  mediaType: text/x-typescript
  fileExtension: .ts
  latestUrlBehavior: redirect

c-sharp:
  type: Format
  label: C#
  mediaType: text/x-csharp
  fileExtension: .cs
  latestUrlBehavior: redirect

rust:
  type: Format
  label: Rust
  mediaType: text/x-rust
  fileExtension: .rs
  latestUrlBehavior: redirect

python:
  type: Format
  label: Python
  mediaType: text/x-python
  fileExtension: .py
  latestUrlBehavior: redirect
