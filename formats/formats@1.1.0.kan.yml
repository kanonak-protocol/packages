# =============================================================================
# formats @ 1.1.0
#
# Canonical names for derivation target formats. A `Format` is the
# *what* a Kanonak resource can be derived into — `html`, `markdown`,
# `typescript`, etc. Used by `kanonak.org/derivations@1.0.0` so that
# class → transformation bindings reference formats as named instances
# rather than magic strings (no `js` vs `javascript` drift, no `csharp`
# vs `c-sharp` ambiguity).
#
# This package is intentionally extensible. Publishers may define their
# own Format instances (e.g. a `pdf` format, a `mermaid` format, a
# `csv` format) in their own packages. The vocabulary here is the
# initial canonical set, not a closed enumeration.
#
# Each Format carries:
#   - mediaType:     IANA media type for HTTP / file-system identification.
#   - fileExtension: Conventional extension (with leading dot) for
#                    artifact filenames. Optional — some formats are
#                    embedded rather than file-based.
#
# -----------------------------------------------------------------------------
# 1.1.0 — additive minor bump. Adds the `dynamodb-json` Format: the
# DynamoDB attribute-value JSON dialect emitted by the transformations
# dynamodb-json backend. Authors targeting 1.0.0 don't need to migrate.
# =============================================================================

formats:
  type: Package
  publisher: kanonak.org
  version: 1.1.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

# =============================================================================
# CLASS
# =============================================================================

Format:
  type: rdfs.Class
  label: Format
  comment: >-
    A canonical name for a derivation target format. Instances of
    Format are referenced by `derivations.Derivation.format` to
    declare what kind of artifact a transformation produces.

# =============================================================================
# PROPERTIES
# =============================================================================

mediaType:
  type: owl.DatatypeProperty
  domain: Format
  range: xsd.string
  label: Media Type
  comment: >-
    IANA media type for this format (e.g. `text/html`, `application/json`).
    Used by runtimes to set Content-Type headers and by file-system
    consumers to choose viewers.

fileExtension:
  type: owl.DatatypeProperty
  domain: Format
  range: xsd.string
  label: File Extension
  comment: >-
    Conventional file extension including the leading dot (e.g.
    `.html`, `.ts`). Optional — some formats are embedded rather than
    persisted as files.

# =============================================================================
# CANONICAL INSTANCES
#
# Authors targeting these formats reference them as
# `formats.html`, `formats.markdown`, etc. via the import alias.
# =============================================================================

html:
  type: Format
  label: HTML
  mediaType: text/html
  fileExtension: .html

stylesheet:
  type: Format
  label: Stylesheet
  mediaType: text/css
  fileExtension: .css
  comment: >-
    CSS stylesheet — a separate derivable artifact alongside the
    structural HTML output. universal-derivations binds a baseline
    stylesheet derivation at (formats.stylesheet, default) on
    rdfs.Resource so every Kanonak Browser implementation gets the
    same look out of the box. Publishers override at any class level
    for per-class branding; users publish a personal-theme package
    that augments rdfs.Resource for global theming. See
    kanonak.org/derivation-conventions for DRY authoring patterns
    and override cascade guidance.

markdown:
  type: Format
  label: Markdown
  mediaType: text/markdown
  fileExtension: .md

json:
  type: Format
  label: JSON
  mediaType: application/json
  fileExtension: .json

dynamodb-json:
  type: Format
  label: DynamoDB JSON
  mediaType: application/json
  fileExtension: .json
  comment: >-
    DynamoDB attribute-value JSON — the `{ "S": … } / { "N": … } /
    { "M": … } / { "L": … }` dialect consumed by `PutItem` /
    `BatchWriteItem` and the CloudFormation / CDK item syntax. A
    serialization dialect of JSON (same media type and extension),
    not a database client: emitted by the transformations
    dynamodb-json backend as a pure docast.Document → string
    serializer. Anything that writes to DynamoDB stays in consumer
    code.

yaml:
  type: Format
  label: YAML
  mediaType: application/yaml
  fileExtension: .yaml

xml:
  type: Format
  label: XML
  mediaType: application/xml
  fileExtension: .xml

svg:
  type: Format
  label: SVG
  mediaType: image/svg+xml
  fileExtension: .svg

typescript:
  type: Format
  label: TypeScript
  mediaType: text/x-typescript
  fileExtension: .ts

c-sharp:
  type: Format
  label: C#
  mediaType: text/x-csharp
  fileExtension: .cs

rust:
  type: Format
  label: Rust
  mediaType: text/x-rust
  fileExtension: .rs

python:
  type: Format
  label: Python
  mediaType: text/x-python
  fileExtension: .py
