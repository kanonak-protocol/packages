skill-to-skill-md:
  type: Package
  publisher: kanonak.org
  version: 3.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.0.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.0.0
          alias: docast
        - package: agent-skills
          match: ^
          version: 1.2.0
          alias: skills
        - package: core-spdx
          match: ^
          version: 1.0.0
          alias: spdx

# =============================================================================
# Skill → SKILL.md transformation (3.0 port).
#
# One Skill instance produces one SKILL.md artifact. Output is byte-
# identical to the legacy 2.0 transformation: `---`-delimited YAML
# frontmatter (name, description, license?, compatibility?,
# allowed-tools?) followed by `## Heading` + paragraph pairs for
# each Skill.hasSection entry.
#
# v3 differences from v2:
#   - tx.Transformation → tx.InstanceTransformation (explicit cardinality)
#   - tx.kind: discriminator → type: explicit subclass narrowing
#   - tx.requires uses property references (not strings)
#   - tx.AstFieldBinding embeddeds drop their explicit `type:` per
#     prefer-implicit-embedded-type-rule (the range is AstFieldBinding)
# =============================================================================

skill-to-skill-md-transformation:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: skills.Skill
    tx.requires:
      - skills.name
      - skills.description

  tx.artifactName:
    type: tx.PropertyRead
    tx.readSource:
      type: tx.VarRef
      tx.varName: input
    tx.readProp: skills.name

  tx.outputs:
    - tx.markdown-with-frontmatter

  tx.formatOverrides:
    - tx.formatTarget: tx.markdown-with-frontmatter
      tx.trailingNewline: false

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # --- Document.metadata = StructuredMap(...) ---
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:

                  # --- name entry (always present) ---
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: name
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: skills.name
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          type: tx.UriLiteral
                          tx.refTo: docast.esc-raw

                  # --- description entry (always present) ---
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: description
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Normalize
                                tx.normKind: tx.trim-end
                                tx.normSource:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: skills.description
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          type: tx.UriLiteral
                          tx.refTo: docast.esc-raw

                  # --- license entry (optional; falls back to the
                  #     reference's local name when no spdxId is set) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: skills.license
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: license
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.Fallback
                                  tx.primary:
                                    type: tx.Traverse
                                    tx.traverseSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.through: skills.license
                                    tx.step:
                                      type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: spdx.spdxId
                                  tx.alternate:
                                    type: tx.UriName
                                    tx.uriNameOf:
                                      type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: skills.license
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            type: tx.UriLiteral
                            tx.refTo: docast.esc-raw

                  # --- compatibility entry (optional) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: skills.compatibility
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: compatibility
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.Normalize
                                  tx.normKind: tx.trim-end
                                  tx.normSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: skills.compatibility
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            type: tx.UriLiteral
                            tx.refTo: docast.esc-raw

                  # --- allowed-tools entry (optional; space-joined
                  #     list of Tool entity names) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: skills.allowedTools
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: allowed-tools
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.Join
                                  tx.separator: " "
                                  tx.source:
                                    type: tx.ListMap
                                    tx.source:
                                      type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: skills.allowedTools
                                    tx.loopVar: t
                                    tx.mapBody:
                                      type: tx.UriName
                                      tx.uriNameOf:
                                        type: tx.VarRef
                                        tx.varName: t
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            type: tx.UriLiteral
                            tx.refTo: docast.esc-raw

      # --- Document.children = ForEach(hasSection) emitting [Heading, Paragraph] ---
      - tx.field: docast.children
        tx.bindValue:
          type: tx.ForEach
          tx.source:
            type: tx.PropertyRead
            tx.readSource:
              type: tx.VarRef
              tx.varName: input
            tx.readProp: skills.hasSection
          tx.loopVar: section
          tx.emit:
            type: tx.Concat
            tx.parts:
              # Heading(level=2, Text(section.title))
              - type: tx.BuildAstNode
                tx.astClass: docast.Heading
                tx.set:
                  - tx.field: docast.level
                    tx.bindValue:
                      type: tx.IntegerLiteral
                      tx.integerLiteral: 2
                  - tx.field: docast.inlines
                    tx.bindValue:
                      type: tx.Concat
                      tx.parts:
                        - type: tx.BuildAstNode
                          tx.astClass: docast.Text
                          tx.set:
                            - tx.field: docast.text
                              tx.bindValue:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: section
                                tx.readProp: skills.title
              # Section body — markdown emitted as a RawBlock
              - type: tx.BuildAstNode
                tx.astClass: docast.RawBlock
                tx.set:
                  - tx.field: docast.mediaType
                    tx.bindValue:
                      type: tx.UriLiteral
                      tx.refTo: docast.text-markdown
                  - tx.field: docast.rawContent
                    tx.bindValue:
                      type: tx.Normalize
                      tx.normKind: tx.trim-end
                      tx.normSource:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: section
                        tx.readProp: skills.body
