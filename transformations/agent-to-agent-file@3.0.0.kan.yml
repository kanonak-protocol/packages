agent-to-agent-file:
  type: Package
  publisher: kanonak.org
  version: 3.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.1.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.0.0
          alias: docast
        - package: agents
          match: ^
          version: 1.0.0
          alias: a

# =============================================================================
# Agent → agent-file transformation (3.0 port).
#
# One Agent instance produces one file in either markdown-with-
# frontmatter or TOML format, selected by the caller via outputFormat.
# Output is byte-identical to the legacy 2.0 transformation.
# =============================================================================

agent-to-agent-file-transformation:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: a.Agent
    tx.requires:
      - a.agentId
      - a.description
      - a.instructions

  tx.artifactName:
    type: tx.PropertyRead
    tx.readSource:
      type: tx.VarRef
      tx.varName: input
    tx.readProp: a.agentId

  tx.outputs:
    - tx.markdown-with-frontmatter
    - tx.toml

  tx.formatOverrides:

    - tx.formatTarget: tx.markdown-with-frontmatter
      tx.metadataKeys:
        - "name"
        - "description"
        - "model"
        - "color"
        - "maxTurns"
        - "permissionMode"
        - "tools"
      tx.trailingNewline: true

    - tx.formatTarget: tx.toml
      tx.metadataKeys:
        - "name"
        - "description"
        - "instructions"
        - "model"
        - "maxTurns"
        - "tools"
      tx.metadataRenames:
        - tx.fromKey: "instructions"
          tx.toKey: "developer_instructions"
        - tx.fromKey: "maxTurns"
          tx.toKey: "max_turns"
      tx.trailingNewline: true

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # --- Document.metadata = StructuredMap with every potential key ---
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:

                  # --- name (= agentId; always present) ---
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: name
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: a.agentId

                  # --- description (always present; YAML-safe in MD,
                  #     default tomlString in TOML) ---
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: description
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: a.description
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          type: tx.UriLiteral
                          tx.refTo: docast.esc-yaml-safe

                  # --- instructions (Markdown override drops it; TOML
                  #     renames + multiline) ---
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: instructions
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: a.instructions
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          type: tx.UriLiteral
                          tx.refTo: docast.esc-toml-multiline

                  # --- model (optional) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: a.model
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: model
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: a.model

                  # --- color (optional; Markdown-only) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: a.color
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: color
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: a.color

                  # --- maxTurns (optional integer) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: a.maxTurns
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: maxTurns
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.IntegerScalar
                            tx.set:
                              - tx.field: docast.integerValue
                                tx.bindValue:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: a.maxTurns

                  # --- permissionMode (optional; Markdown-only) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: a.permissionMode
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: permissionMode
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  type: tx.UriName
                                  tx.uriNameOf:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: a.permissionMode

                  # --- tools (optional; StructuredList of StringScalars
                  #     built from usesTool references) ---
                  - type: tx.When
                    tx.condition:
                      type: tx.IsSet
                      tx.checkExpr:
                        type: tx.PropertyRead
                        tx.readSource:
                          type: tx.VarRef
                          tx.varName: input
                        tx.readProp: a.usesTool
                    tx.thenBuild:
                      type: tx.BuildAstNode
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            type: tx.StringLiteral
                            tx.stringLiteral: tools
                        - tx.field: docast.value
                          tx.bindValue:
                            type: tx.BuildAstNode
                            tx.astClass: docast.StructuredList
                            tx.set:
                              - tx.field: docast.items
                                tx.bindValue:
                                  type: tx.ListMap
                                  tx.source:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: a.usesTool
                                  tx.loopVar: t
                                  tx.mapBody:
                                    type: tx.BuildAstNode
                                    tx.astClass: docast.StringScalar
                                    tx.set:
                                      - tx.field: docast.stringValue
                                        tx.bindValue:
                                          type: tx.UriName
                                          tx.uriNameOf:
                                            type: tx.VarRef
                                            tx.varName: t

      # --- Document.children = [Paragraph(Text(trimEnd(instructions)))]
      #     Markdown-only channel; TOML backend ignores children entirely. ---
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.Paragraph
              tx.set:
                - tx.field: docast.inlines
                  tx.bindValue:
                    type: tx.Concat
                    tx.parts:
                      - type: tx.BuildAstNode
                        tx.astClass: docast.Text
                        tx.set:
                          - tx.field: docast.text
                            tx.bindValue:
                              type: tx.Normalize
                              tx.normKind: tx.trim-end
                              tx.normSource:
                                type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: a.instructions
