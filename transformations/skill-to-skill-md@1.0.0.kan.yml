skill-to-skill-md:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 1.0.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.0.0
          alias: docast
        - package: agent-skills
          match: ^
          version: 1.2.0
          alias: skills
        - package: core-spdx
          match: ^
          version: 1.0.0
          alias: spdx

# =============================================================================
# The transformation itself: one Skill instance → one SKILL.md artifact.
#
# Matches the behavior of the legacy `SkillTransformer.transformSkillsToSkillMd`
# byte-for-byte. Emits `---`-delimited YAML frontmatter with five keys
# (name, description, license?, compatibility?, allowed-tools?) followed
# by `## Heading` + paragraph pairs for each Skill.hasSection entry.
# =============================================================================

skill-to-skill-md-transformation:
  type: tx.Transformation

  tx.inputPattern:
    tx.matchesClass: skills.Skill
    tx.requires:
      - "kanonak.org/agent-skills/name"
      - "kanonak.org/agent-skills/description"

  tx.artifactName:
    tx.kind: tx.property-read
    tx.readSource:
      tx.kind: tx.var-ref
      tx.varName: input
    tx.readProp: skills.name

  tx.outputs:
    - tx.markdown-with-frontmatter

  tx.formatOverrides:
    - tx.formatTarget: tx.markdown-with-frontmatter
      tx.trailingNewline: false

  tx.rule:
    # BuildAstNode(Document)
    tx.kind: tx.build-ast-node
    tx.astClass: docast.Document
    tx.set:

      # --- Document.metadata = StructuredMap(...) ---
      - tx.field: docast.metadata
        tx.bindValue:
          tx.kind: tx.build-ast-node
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                tx.kind: tx.concat
                tx.parts:

                  # --- name entry (always present) ---
                  - tx.kind: tx.build-ast-node
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          tx.kind: tx.string-literal
                          tx.stringLiteral: skills.name
                      - tx.field: docast.value
                        tx.bindValue:
                          tx.kind: tx.build-ast-node
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                tx.kind: tx.property-read
                                tx.readSource:
                                  tx.kind: tx.var-ref
                                  tx.varName: input
                                tx.readProp: skills.name
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          tx.kind: tx.uri-literal
                          tx.refTo: docast.esc-raw

                  # --- description entry (always present) ---
                  - tx.kind: tx.build-ast-node
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          tx.kind: tx.string-literal
                          tx.stringLiteral: description
                      - tx.field: docast.value
                        tx.bindValue:
                          tx.kind: tx.build-ast-node
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                tx.kind: tx.normalize
                                tx.normKind: tx.trim-end
                                tx.normSource:
                                  tx.kind: tx.property-read
                                  tx.readSource:
                                    tx.kind: tx.var-ref
                                    tx.varName: input
                                  tx.readProp: skills.description
                      - tx.field: docast.escapeHint
                        tx.bindValue:
                          tx.kind: tx.uri-literal
                          tx.refTo: docast.esc-raw

                  # --- license entry (optional; traverses through the
                  #     License reference to read its spdxId, falling
                  #     back to the reference's local name) ---
                  - tx.kind: tx.when
                    tx.condition:
                      tx.kind: tx.is-set
                      tx.checkExpr:
                        tx.kind: tx.property-read
                        tx.readSource:
                          tx.kind: tx.var-ref
                          tx.varName: input
                        tx.readProp: skills.license
                    tx.thenBuild:
                      tx.kind: tx.build-ast-node
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            tx.kind: tx.string-literal
                            tx.stringLiteral: license
                        - tx.field: docast.value
                          tx.bindValue:
                            tx.kind: tx.build-ast-node
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  tx.kind: tx.fallback
                                  tx.primary:
                                    tx.kind: tx.traverse
                                    tx.traverseSource:
                                      tx.kind: tx.var-ref
                                      tx.varName: input
                                    tx.through: skills.license
                                    tx.step:
                                      tx.kind: tx.property-read
                                      tx.readSource:
                                        tx.kind: tx.var-ref
                                        tx.varName: input
                                      tx.readProp: spdx.spdxId
                                  tx.alternate:
                                    tx.kind: tx.uri-name
                                    tx.uriNameOf:
                                      tx.kind: tx.property-read
                                      tx.readSource:
                                        tx.kind: tx.var-ref
                                        tx.varName: input
                                      tx.readProp: skills.license
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            tx.kind: tx.uri-literal
                            tx.refTo: docast.esc-raw

                  # --- compatibility entry (optional) ---
                  - tx.kind: tx.when
                    tx.condition:
                      tx.kind: tx.is-set
                      tx.checkExpr:
                        tx.kind: tx.property-read
                        tx.readSource:
                          tx.kind: tx.var-ref
                          tx.varName: input
                        tx.readProp: skills.compatibility
                    tx.thenBuild:
                      tx.kind: tx.build-ast-node
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            tx.kind: tx.string-literal
                            tx.stringLiteral: compatibility
                        - tx.field: docast.value
                          tx.bindValue:
                            tx.kind: tx.build-ast-node
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  tx.kind: tx.normalize
                                  tx.normKind: tx.trim-end
                                  tx.normSource:
                                    tx.kind: tx.property-read
                                    tx.readSource:
                                      tx.kind: tx.var-ref
                                      tx.varName: input
                                    tx.readProp: skills.compatibility
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            tx.kind: tx.uri-literal
                            tx.refTo: docast.esc-raw

                  # --- allowed-tools entry (optional; space-joined
                  #     list of Tool entity names) ---
                  - tx.kind: tx.when
                    tx.condition:
                      tx.kind: tx.is-set
                      tx.checkExpr:
                        tx.kind: tx.property-read
                        tx.readSource:
                          tx.kind: tx.var-ref
                          tx.varName: input
                        tx.readProp: skills.allowedTools
                    tx.thenBuild:
                      tx.kind: tx.build-ast-node
                      tx.astClass: docast.StructuredEntry
                      tx.set:
                        - tx.field: docast.key
                          tx.bindValue:
                            tx.kind: tx.string-literal
                            tx.stringLiteral: allowed-tools
                        - tx.field: docast.value
                          tx.bindValue:
                            tx.kind: tx.build-ast-node
                            tx.astClass: docast.StringScalar
                            tx.set:
                              - tx.field: docast.stringValue
                                tx.bindValue:
                                  tx.kind: tx.join
                                  tx.separator: " "
                                  tx.items:
                                    tx.kind: tx.list-map
                                    tx.listMapSource:
                                      tx.kind: tx.property-read
                                      tx.readSource:
                                        tx.kind: tx.var-ref
                                        tx.varName: input
                                      tx.readProp: skills.allowedTools
                                    tx.loopVar: t
                                    tx.mapBody:
                                      tx.kind: tx.uri-name
                                      tx.uriNameOf:
                                        tx.kind: tx.var-ref
                                        tx.varName: t
                        - tx.field: docast.escapeHint
                          tx.bindValue:
                            tx.kind: tx.uri-literal
                            tx.refTo: docast.esc-raw

      # --- Document.children = ForEach(hasSection) emitting [Heading, Paragraph] ---
      - tx.field: docast.children
        tx.bindValue:
          tx.kind: tx.for-each
          tx.iterate:
            tx.kind: tx.property-read
            tx.readSource:
              tx.kind: tx.var-ref
              tx.varName: input
            tx.readProp: skills.hasSection
          tx.loopVar: section
          tx.emit:
            tx.kind: tx.concat
            tx.parts:
              # Heading(level=2, Text(section.title))
              - tx.kind: tx.build-ast-node
                tx.astClass: docast.Heading
                tx.set:
                  - tx.field: docast.level
                    tx.bindValue:
                      tx.kind: tx.integer-literal
                      tx.integerLiteral: 2
                  - tx.field: docast.inlines
                    tx.bindValue:
                      tx.kind: tx.concat
                      tx.parts:
                        - tx.kind: tx.build-ast-node
                          tx.astClass: docast.Text
                          tx.set:
                            - tx.field: docast.text
                              tx.bindValue:
                                tx.kind: tx.property-read
                                tx.readSource:
                                  tx.kind: tx.var-ref
                                  tx.varName: section
                                tx.readProp: skills.title
              # Section body is MARKDOWN — emitted here as a RawBlock
              # with mediaType=text-markdown so any future non-Markdown
              # backend knows how to interpret it. The markdown-with-
              # frontmatter backend renders the RawBlock verbatim, which
              # keeps the existing SKILL.md output byte-identical.
              - tx.kind: tx.build-ast-node
                tx.astClass: docast.RawBlock
                tx.set:
                  - tx.field: docast.mediaType
                    tx.bindValue:
                      tx.kind: tx.uri-literal
                      tx.refTo: docast.text-markdown
                  - tx.field: docast.rawContent
                    tx.bindValue:
                      tx.kind: tx.normalize
                      tx.normKind: tx.trim-end
                      tx.normSource:
                        tx.kind: tx.property-read
                        tx.readSource:
                          tx.kind: tx.var-ref
                          tx.varName: section
                        tx.readProp: skills.body
