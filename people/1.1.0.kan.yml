people:
  type: Package
  publisher: kanonak.org
  version: 1.1.0
  label: People
  comment: >-
    A catalog of the people who author and contribute to Kanonak work.
    Each is a provenance.Person with a stable URI, so the author and
    contributor properties can credit the same person consistently
    wherever they appear. The parallel to the stewards package: stewards
    holds the organizations that govern protocols, this holds the
    individuals who write them.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: provenance
          match: ^
          version: 1.0.0
          alias: prov
        - package: link
          match: ^
          version: 1.0.0
          alias: link
        - package: look
          match: ^
          version: 1.21.0
          alias: look
        - package: transformations
          match: ^
          version: 3.14.0
          alias: tx

paul-fryer:
  type: prov.Person
  label: Paul Fryer
  comment: >-
    Creator of the Kanonak Protocol. An uncommon intersection of deep
    semantic-modeling roots, two decades architecting large-scale
    distributed and multi-tenant systems (banking at Fiserv, retail cloud
    at AWS), and hands-on work applying AI in production — the exact
    background that positioned him to design an open, versioned protocol
    for sharing machine-readable vocabularies across independent
    publishers.
  link.links:
    - label: LinkedIn
      link.url: https://www.linkedin.com/in/paulfryerlinkedin/
      comment: Professional profile
    - label: GitHub
      link.url: https://github.com/paulfryer
      comment: Code and open-source work
