# =============================================================================
# look-tokens @ 1.0.0
#
# Visual token vocabulary for the Kanonak look layer. Tokens are named
# visual values — colors, fonts, sizes, numbers — that cascade through
# the class hierarchy. The protocol's universal-look renderer
# materializes resolved tokens as CSS custom properties (`--kan-*`) on
# every rendered page.
#
# v1.0.0 representation: each named token is declared as an
# `owl.DatatypeProperty` with `range: xsd.string`. CSS values (colors,
# font stacks, lengths, numbers) are all expressed as strings. The
# parser recognizes each token as a property, allowing
# `derivation.tokens: { accent: "hsl(...)" }` to parse as a
# StringStatement with predicate=`accent`.
#
# Token classification (ColorToken, FontToken, SpacingToken, NumberToken)
# is reserved for a future minor bump that adds validator-driven type
# checking — for now, the token's `comment` explains its expected
# value shape.
#
# This package augments `rdfs.Resource` with baseline token values via
# the open-world model, so every Kanonak class implicitly inherits the
# universal defaults at the root of its hierarchy. Publishers override
# specific tokens at their own classes via the standard cascade.
# =============================================================================

look-tokens:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation

# =============================================================================
# COLOR TOKENS — page surfaces and content
# =============================================================================

bg:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Background
  comment: Primary page background color. Expected value is a CSS color.

bg-card:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Card Background
  comment: Background color for cards, panels, and grouped content. CSS color.

bg-elev:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Elevated Background
  comment: Background for elements raised above bg-card (nested cards, modals, tooltips). CSS color.

text:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Text
  comment: Primary text color. CSS color.

text-dim:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Dim Text
  comment: Secondary text color — descriptions, captions, dim labels. CSS color.

text-faint:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Faint Text
  comment: Tertiary text color — metadata, footers, low-emphasis content. CSS color.

border:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Border
  comment: Default border color for cards, dividers, and outlines. CSS color.

border-soft:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Soft Border
  comment: Subtle border color for low-contrast separation. CSS color.

# =============================================================================
# COLOR TOKENS — interactive and emphasis
# =============================================================================

accent:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Accent
  comment: >-
    Primary accent color used for links, badges, type chips, and
    emphasis. The single most important token to override per class
    to give a publisher's site visual identity. CSS color.

accent-hover:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Accent Hover
  comment: Hover state for accent-colored interactive elements. CSS color.

badge-bg:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Badge Background
  comment: Background color for type badges and chips. CSS color (typically translucent).

badge-fg:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Badge Foreground
  comment: Text color for type badges and chips. CSS color.

# =============================================================================
# FONT TOKENS
# =============================================================================

font-body:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Body Font
  comment: Default font stack for body text. CSS font-family value.

font-display:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Display Font
  comment: Font stack for headings and large text. CSS font-family value.

font-mono:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Monospace Font
  comment: Font stack for code, technical labels, and URI displays. CSS font-family value.

# =============================================================================
# SPACING TOKENS
# =============================================================================

radius:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Border Radius
  comment: Default border-radius for cards, buttons, and inputs. CSS length.

radius-sm:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Small Border Radius
  comment: Smaller border-radius for badges, chips, and inline pills. CSS length.

spacing-unit:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Spacing Unit
  comment: Base spacing increment. Layouts derive larger spaces as multiples of this. CSS length.

# =============================================================================
# NUMBER TOKENS
# =============================================================================

line-height-body:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Body Line Height
  comment: Default line-height for body text. Unitless number expressed as string.

line-height-heading:
  type: owl.DatatypeProperty
  domain: rdfs.Resource
  range: xsd.string
  label: Heading Line Height
  comment: Default line-height for headings. Unitless number expressed as string.

# =============================================================================
# UNIVERSAL DEFAULTS ON rdfs.Resource
#
# Open-world augmentation: this package adds `derivation.tokens` to
# rdfs.Resource so every Kanonak class implicitly inherits these
# baseline values at the root of its hierarchy. Publishers override
# specific tokens at their own classes via the standard cascade.
# =============================================================================

rdfs.Resource:
  derivation.tokens:
    bg: "#0f0f11"
    bg-card: "#18181b"
    bg-elev: "#1f2128"
    text: "#e4e4e7"
    text-dim: "#a1a1aa"
    text-faint: "#71717a"
    border: "#27272a"
    border-soft: "#1c1c1f"
    accent: "hsl(210, 90%, 55%)"
    accent-hover: "hsl(210, 90%, 65%)"
    badge-bg: "rgba(96, 165, 250, 0.12)"
    badge-fg: "hsl(210, 90%, 70%)"
    font-body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-display: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-mono: "ui-monospace, 'JetBrains Mono', 'SF Mono', Consolas, Menlo, monospace"
    radius: "6px"
    radius-sm: "3px"
    spacing-unit: "16px"
    line-height-body: "1.65"
    line-height-heading: "1.2"
