core-spdx:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

License:
  type: rdfs.Class
  label: License
  comment: >-
    A software license defining terms for use, modification, and
    distribution. Based on SPDX (Software Package Data Exchange) license
    definitions. Can be referenced by name (e.g., license: MIT) or
    embedded inline for custom licenses (type inferred from the license
    property's range).

spdxId:
  type: owl.DatatypeProperty
  domain: License
  range: xsd.string
  label: SPDX Identifier
  comment: >-
    Standard SPDX license identifier (e.g., "MIT", "Apache-2.0").
    Optional - only applicable for licenses listed at
    https://spdx.org/licenses/.

name:
  type: owl.DatatypeProperty
  domain: License
  range: xsd.string
  label: Name
  comment: Full human-readable license name.

url:
  type: owl.DatatypeProperty
  domain: License
  range: xsd.anyURI
  label: URL
  comment: Canonical URL to the full license text.

isOsiApproved:
  type: owl.DatatypeProperty
  domain: License
  range: xsd.boolean
  label: OSI Approved
  comment: Whether this license is approved by the Open Source Initiative.

isFsfFree:
  type: owl.DatatypeProperty
  domain: License
  range: xsd.boolean
  label: FSF Free
  comment: >-
    Whether this license is considered free by the Free Software
    Foundation.

Permission:
  type: rdfs.Class
  label: Permission
  comment: >-
    What a license permits. Extensible - publishers can define custom
    permissions in their own packages.

Condition:
  type: rdfs.Class
  label: Condition
  comment: >-
    A condition required by a license. Extensible - publishers can
    define custom conditions in their own packages.

Limitation:
  type: rdfs.Class
  label: Limitation
  comment: >-
    What a license does not grant. Extensible - publishers can define
    custom limitations in their own packages.

permissions:
  type: owl.ObjectProperty
  domain: License
  range: Permission
  label: Permissions
  comment: What the license permits.

conditions:
  type: owl.ObjectProperty
  domain: License
  range: Condition
  label: Conditions
  comment: Conditions required by the license.

limitations:
  type: owl.ObjectProperty
  domain: License
  range: Limitation
  label: Limitations
  comment: What the license does not grant.

commercial-use:
  type: Permission
  label: Commercial Use
  comment: Use the licensed work for commercial purposes.

modification:
  type: Permission
  label: Modification
  comment: Modify the licensed work.

distribution:
  type: Permission
  label: Distribution
  comment: Distribute the licensed work.

patent-use:
  type: Permission
  label: Patent Use
  comment: Practice patent claims of contributors to the code.

private-use:
  type: Permission
  label: Private Use
  comment: Use the licensed work for private purposes.

include-copyright:
  type: Condition
  label: Include Copyright
  comment: Include the original copyright and license notice in distributions.

state-changes:
  type: Condition
  label: State Changes
  comment: Document changes made to the licensed work.

disclose-source:
  type: Condition
  label: Disclose Source
  comment: Source code must be made available when distributing.

same-license:
  type: Condition
  label: Same License
  comment: Derivative works must be distributed under the same license.

same-license-file:
  type: Condition
  label: Same License (File)
  comment: Modified files must be distributed under the same license.

network-use-is-distribution:
  type: Condition
  label: Network Use Is Distribution
  comment: Users who interact with the software over a network get source access.

no-liability:
  type: Limitation
  label: No Liability
  comment: The license includes a limitation of liability.

no-warranty:
  type: Limitation
  label: No Warranty
  comment: The license explicitly states it does not provide any warranty.

no-trademark-use:
  type: Limitation
  label: No Trademark Use
  comment: The license does not grant trademark rights.

no-patent-use:
  type: Limitation
  label: No Patent Use
  comment: The license does not grant patent rights.

MIT:
  type: License
  spdxId: MIT
  name: MIT License
  url: https://opensource.org/licenses/MIT
  isOsiApproved: true
  isFsfFree: true
  permissions:
    - commercial-use
    - modification
    - distribution
    - private-use
  conditions:
    - include-copyright
  limitations:
    - no-liability
    - no-warranty

