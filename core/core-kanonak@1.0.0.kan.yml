
core-kanonak:
  type: Package
  publisher: kanonak.org
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

Publisher:
  type: rdfs.Class
  label: Publisher
  comment: A package publisher identified by domain

Package:
  type: rdfs.Class
  label: Package
  comment: A Kanonak package with version and dependencies

Import:
  type: rdfs.Class
  label: Import
  comment: A package import specification

PublisherImport:
  type: rdfs.Class
  label: Publisher Import
  comment: A group of package imports from a single publisher

publisher:
  type: owl.ObjectProperty
  label: Publisher
  comment: The publisher of a package or import group
  domain: Package, Import, PublisherImport
  range: Publisher

version:
  type: owl.DatatypeProperty
  label: Version
  comment: The semantic version of a package or import constraint
  domain: Package, Import
  range: xsd.string

imports:
  type: owl.ObjectProperty
  label: Imports
  comment: List of package imports grouped by publisher
  domain: Package
  range: PublisherImport

packages:
  type: owl.ObjectProperty
  label: Packages
  comment: List of package imports from this publisher
  domain: PublisherImport
  range: Import

package:
  type: owl.ObjectProperty
  label: Package
  comment: The package being imported
  domain: Import
  range: Package

match:
  type: owl.DatatypeProperty
  label: Match
  comment: Version match operator (*, ~, ^, =)
  domain: Import
  range: xsd.string

alias:
  type: owl.DatatypeProperty
  label: Alias
  comment: Optional namespace alias for the import
  domain: Import
  range: xsd.string
