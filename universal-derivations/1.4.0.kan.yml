# =============================================================================
# universal-derivations @ 1.4.0
#
# Architectural rewrite: factors per-value rendering into a recursive
# ExpressionFragment (`render-value`). Earlier versions handled deeper
# nesting by inlining a truncated dispatch chain at each level, so
# references inside embeddeds — and embeddeds inside embeddeds — still
# rendered as string-coerced text. 1.4.0 makes the rendering truly
# recursive: every value, no matter how deeply nested, runs through
# the same four-way dispatch (Reference, Embedded, List, scalar).
#
# Mechanism:
#   - The `render-value` ExpressionFragment encapsulates the dispatch.
#     Its body reads `currentValue` from scope and branches on its
#     kind, producing the appropriate docast node.
#   - Reference branch  → docast.ResourceLink
#   - Embedded branch   → nested docast.PropertyList whose entries
#                         recursively bind each sub-statement's value
#                         via tx.Let and re-invoke render-value.
#   - List branch       → ForEach items, bind each via Let, re-invoke.
#   - Scalar fallback   → wrap currentValue in tx.Concat for
#                         SCALAR_STRING_FIELDS auto-string-coercion.
#
# The top-level transformation rule emits the Document shell
# (metadata + heading + outermost PropertyList of the input's
# statements) and uses tx.Let + CallFragment(render-value) to render
# each statement's value. Recursion is bounded by the loader's
# MAX_FRAGMENT_DEPTH (16) — sufficient for any practical resource
# graph; deeper would require revisiting the depth limit.
#
# Requires tx 3.9.0 (Let primitive) and docast 1.1.0 (ResourceLink +
# PropertyList vocabulary).
#
# Visible behavior change vs 1.3.0: properties on embedded resources
# whose values are references (e.g. `forRegime: reg.quiet-contango`
# inside a hasFitnessScore embedded) now render as clickable links
# instead of plain text. Same for any value at any nesting depth.
#
# 1.0.0 – 1.3.0 preserved on disk archivally; consumers pinned to
# them continue working unchanged.
# =============================================================================

universal-derivations:
  type: Package
  publisher: kanonak.org
  version: 1.4.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.9.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.1.0
          alias: docast
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation

# =============================================================================
# RECURSIVE VALUE RENDERER FRAGMENT
#
# Reads `currentValue` from scope (set by the caller via tx.Let or
# tx.ForEach loopVar) and produces a docast node appropriate to the
# value's runtime kind. Recurses for Embedded and List by re-binding
# `currentValue` and re-invoking itself via CallFragment.
# =============================================================================

render-value:
  type: tx.ExpressionFragment
  tx.body:

    type: tx.When
    tx.condition:
      type: tx.IsReference
      tx.kindCheck:
        type: tx.VarRef
        tx.varName: currentValue
    tx.thenBuild:
      # Reference branch — emit a clickable ResourceLink. The target
      # is the value itself (a ReferenceKanonak or a SubjectKanonak
      # that resolved cleanly during parse). The backend extracts
      # the canonical URI from either shape.
      type: tx.BuildAstNode
      tx.astClass: docast.ResourceLink
      tx.set:
        - tx.field: docast.target
          tx.bindValue:
            type: tx.VarRef
            tx.varName: currentValue

    tx.elseBuild:
      type: tx.When
      tx.condition:
        type: tx.IsEmbedded
        tx.kindCheck:
          type: tx.VarRef
          tx.varName: currentValue
      tx.thenBuild:
        # Embedded branch. When the embedded has a name (dict-keyed
        # in YAML, e.g. `fit-quiet: {…}`), wrap its statements in a
        # single-entry PropertyList using the dict-key name as the
        # entry's key — preserves the per-item naming in lists of
        # named embeddeds. When the embedded is positional (no
        # dict-key), emit the bare nested PropertyList of its
        # statements without the wrapper.
        type: tx.When
        tx.condition:
          type: tx.IsSet
          tx.checkExpr:
            type: tx.UriName
            tx.uriNameOf:
              type: tx.VarRef
              tx.varName: currentValue
        tx.thenBuild:
          # Named (dict-keyed) embedded — wrap with name as header.
          type: tx.BuildAstNode
          tx.astClass: docast.PropertyList
          tx.set:
            - tx.field: docast.propertyEntries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.PropertyEntry
                    tx.set:
                      - tx.field: docast.propertyKey
                        tx.bindValue:
                          type: tx.UriName
                          tx.uriNameOf:
                            type: tx.VarRef
                            tx.varName: currentValue
                      - tx.field: docast.propertyValue
                        tx.bindValue:
                          type: tx.Concat
                          tx.parts:
                            - type: tx.BuildAstNode
                              tx.astClass: docast.PropertyList
                              tx.set:
                                - tx.field: docast.propertyEntries
                                  tx.bindValue:
                                    type: tx.ForEach
                                    tx.source:
                                      type: tx.AllStatements
                                      tx.statementsOf:
                                        type: tx.VarRef
                                        tx.varName: currentValue
                                    tx.loopVar: subStmt
                                    tx.emit:
                                      type: tx.BuildAstNode
                                      tx.astClass: docast.PropertyEntry
                                      tx.set:
                                        - tx.field: docast.propertyKey
                                          tx.bindValue:
                                            type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.StatementPredicate
                                              tx.predicateOf:
                                                type: tx.VarRef
                                                tx.varName: subStmt
                                        - tx.field: docast.propertyValue
                                          tx.bindValue:
                                            type: tx.Concat
                                            tx.parts:
                                              - type: tx.Let
                                                tx.letName: currentValue
                                                tx.letValue:
                                                  type: tx.StatementObject
                                                  tx.statementSource:
                                                    type: tx.VarRef
                                                    tx.varName: subStmt
                                                tx.letBody:
                                                  type: tx.CallFragment
                                                  tx.fragmentRef: render-value
        tx.elseBuild:
          # Positional embedded — bare nested PropertyList of statements.
          type: tx.BuildAstNode
          tx.astClass: docast.PropertyList
          tx.set:
            - tx.field: docast.propertyEntries
              tx.bindValue:
                type: tx.ForEach
                tx.source:
                  type: tx.AllStatements
                  tx.statementsOf:
                    type: tx.VarRef
                    tx.varName: currentValue
                tx.loopVar: subStmt
                tx.emit:
                  type: tx.BuildAstNode
                  tx.astClass: docast.PropertyEntry
                  tx.set:
                    - tx.field: docast.propertyKey
                      tx.bindValue:
                        type: tx.UriName
                        tx.uriNameOf:
                          type: tx.StatementPredicate
                          tx.predicateOf:
                            type: tx.VarRef
                            tx.varName: subStmt
                    - tx.field: docast.propertyValue
                      tx.bindValue:
                        type: tx.Concat
                        tx.parts:
                          - type: tx.Let
                            tx.letName: currentValue
                            tx.letValue:
                              type: tx.StatementObject
                              tx.statementSource:
                                type: tx.VarRef
                                tx.varName: subStmt
                            tx.letBody:
                              type: tx.CallFragment
                              tx.fragmentRef: render-value

      tx.elseBuild:
        type: tx.When
        tx.condition:
          type: tx.IsList
          tx.kindCheck:
            type: tx.VarRef
            tx.varName: currentValue
        tx.thenBuild:
          # List branch — ForEach items, bind each as currentValue,
          # re-invoke render-value. The ForEach result is a list of
          # rendered nodes that flows into the parent field.
          type: tx.ForEach
          tx.source:
            type: tx.VarRef
            tx.varName: currentValue
          tx.loopVar: item
          tx.emit:
            type: tx.Let
            tx.letName: currentValue
            tx.letValue:
              type: tx.VarRef
              tx.varName: item
            tx.letBody:
              type: tx.CallFragment
              tx.fragmentRef: render-value

        tx.elseBuild:
          # Scalar fallback — wrap currentValue in tx.Concat so the
          # text field's SCALAR_STRING_FIELDS auto-coercion turns the
          # bound value into a string regardless of whether it's a
          # JS string, number, or boolean at runtime.
          type: tx.BuildAstNode
          tx.astClass: docast.Text
          tx.set:
            - tx.field: docast.text
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.VarRef
                    tx.varName: currentValue

# =============================================================================
# UNIVERSAL TRANSFORMATION
#
# Produces a docast.Document for any resource. Used by all three
# format bindings on rdfs.Resource — the same docast tree gets
# serialized differently per backend.
# =============================================================================

any-resource-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: rdfs.Resource

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.html
    - tx.markdown-with-frontmatter
    - tx.json

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # ------------------------------------------------------------
      # Frontmatter / structured metadata channel — read by the
      # markdown-with-frontmatter backend. The HTML and JSON
      # backends ignore it (HTML reads children only; JSON dumps
      # the whole tree).
      # ------------------------------------------------------------
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: name
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: input

                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: source
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.SubjectUri
                                tx.subjectOf:
                                  type: tx.VarRef
                                  tx.varName: input

      # ------------------------------------------------------------
      # Narrative children: H1 with the resource's local name, then
      # a PropertyList of the resource's statements where each
      # value is rendered recursively via the render-value fragment.
      # ------------------------------------------------------------
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:

            - type: tx.BuildAstNode
              tx.astClass: docast.Heading
              tx.set:
                - tx.field: docast.level
                  tx.bindValue:
                    type: tx.IntegerLiteral
                    tx.integerLiteral: 1
                - tx.field: docast.inlines
                  tx.bindValue:
                    type: tx.Concat
                    tx.parts:
                      - type: tx.BuildAstNode
                        tx.astClass: docast.Text
                        tx.set:
                          - tx.field: docast.text
                            tx.bindValue:
                              type: tx.UriName
                              tx.uriNameOf:
                                type: tx.VarRef
                                tx.varName: input

            - type: tx.BuildAstNode
              tx.astClass: docast.PropertyList
              tx.set:
                - tx.field: docast.propertyEntries
                  tx.bindValue:
                    type: tx.ForEach
                    tx.source:
                      type: tx.AllStatements
                      tx.statementsOf:
                        type: tx.VarRef
                        tx.varName: input
                    tx.loopVar: stmt
                    tx.emit:
                      type: tx.BuildAstNode
                      tx.astClass: docast.PropertyEntry
                      tx.set:
                        - tx.field: docast.propertyKey
                          tx.bindValue:
                            type: tx.UriName
                            tx.uriNameOf:
                              type: tx.StatementPredicate
                              tx.predicateOf:
                                type: tx.VarRef
                                tx.varName: stmt
                        - tx.field: docast.propertyValue
                          tx.bindValue:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.Let
                                tx.letName: currentValue
                                tx.letValue:
                                  type: tx.StatementObject
                                  tx.statementSource:
                                    type: tx.VarRef
                                    tx.varName: stmt
                                tx.letBody:
                                  type: tx.CallFragment
                                  tx.fragmentRef: render-value

# =============================================================================
# UNIVERSAL DERIVATION BINDINGS ON rdfs.Resource
#
# Open-world augmentation: this package adds `derivations` statements
# to `rdfs.Resource`, which is defined in `kanonak.org/core-rdf@1.0.0`.
# The parser merges these into the same canonical subject as
# core-rdf's original declaration. Discovery walks the class
# hierarchy bottom-up and finds these defaults at the root.
# =============================================================================

rdfs.Resource:
  derivation.derivations:

    - type: derivation.Derivation
      derivation.format: formats.html
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: kanonak.org
        tx.package: universal-derivations
        tx.version: 1.4.0
        tx.name: any-resource-renderer

    - type: derivation.Derivation
      derivation.format: formats.markdown
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: kanonak.org
        tx.package: universal-derivations
        tx.version: 1.4.0
        tx.name: any-resource-renderer

    - type: derivation.Derivation
      derivation.format: formats.json
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: kanonak.org
        tx.package: universal-derivations
        tx.version: 1.4.0
        tx.name: any-resource-renderer
