
kanonak-protocol:
  type: Package
  publisher: kanonak.org
  version: 1.10.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: protocols
          match: ^
          version: 1.0.0
          alias: pro

kanonak-protocol-spec:
  type: Protocol
  label: Kanonak Protocol
  comment: The Kanonak Protocol - an open protocol for defining, versioning, and sharing semantic ontologies across distributed publishers
  hasConvention:

    uri-structure:
      summary: Kanonak URIs uniquely identify entities using the format publisher/package@version/name
      hasRequiredRule:
        uri-format-rule:
          text: Kanonak URIs MUST follow the format publisher/package@version/name where all components are required
          rationale: Standardized URI format ensures global uniqueness and enables automatic resolution across namespaces and package registries
        uri-uniqueness-rule:
          text: Each Kanonak URI MUST uniquely identify exactly one entity across the entire Kanonak ecosystem
          rationale: Guarantees unambiguous entity references and prevents naming conflicts through publisher namespacing
      hasValidExample:
        core-rdf-class-uri:
          pro.value: kanonak.org/core-rdf@1.0.0/Class
          description: Valid Kanonak URI referencing the Class entity from the core-rdf package
      hasInvalidExample:
        missing-publisher-and-version:
          pro.value: mypackage/Entity
          description: Invalid - missing publisher domain and version components

    publisher-naming:
      summary: Publishers must be domain-based identifiers to establish ownership and enable registry discovery
      hasRequiredRule:
        publisher-domain-rule:
          text: Publisher identifiers MUST be valid domain names containing at least one dot character
          rationale: Domain-based publishers establish clear organizational ownership, enable automatic registry discovery via .well-known endpoints, and prevent naming conflicts through DNS
        publisher-ownership-rule:
          text: Publishers MUST control the domain name used in their publisher identifier
          rationale: Ensures authenticity and prevents namespace squatting by requiring verifiable domain ownership
      hasValidExample:
        kanonak-org:
          pro.value: kanonak.org
          description: Official Kanonak Protocol publisher using a .org domain
        acme-com:
          pro.value: acme.com
          description: Company publisher using a .com domain
      hasInvalidExample:
        not-a-domain:
          pro.value: myproject
          description: Invalid - not a domain name. Must use domain-based identifier like myproject.org or myproject.dev

    package-naming:
      summary: Package names are lowercase-hyphen identifiers that describe the domain of entities they contain, with plural forms reserved for category packages so the singular form is available for instances inside them
      hasRequiredRule:
        package-format-rule:
          text: Package names MUST start with a lowercase letter and contain only lowercase letters, numbers, and hyphens (no periods)
          rationale: Lowercase with hyphens ensures compatibility with file systems, URLs, and OCI registries while maintaining readability. Periods are reserved for alias.resource reference syntax.
      hasRecommendedRule:
        package-hyphenation-rule:
          text: Use hyphen notation to create descriptive package names for related ontologies
          rationale: Hyphen notation enables logical grouping of related packages while avoiding conflicts with alias.resource reference syntax
        category-package-is-plural-rule:
          text: >-
            Packages that define a class or are expected to contain multiple
            related instances SHOULD use a plural kebab-case noun (protocols,
            agent-skills, agents, capabilities, github-skills), so the
            singular form stays available for the instances inside them
          rationale: >-
            A category package is a namespace for a family of things; naming
            it after the family rather than a single member leaves the
            singular name free to identify one member without a YAML duplicate
            key collision with the package declaration. This is how the
            package "protocols" can contain an instance named "mcp" without
            either the document having a duplicate top-level key or forcing
            the instance into a non-conforming PascalCase name.
        instance-package-may-be-singular-rule:
          text: >-
            A package that exists specifically to describe one concrete entity
            MAY use a singular name that matches the entity it describes
            (e.g., mcp, a2a, kanonak-protocol), provided the singleton instance
            inside uses a different kebab-case name so the package declaration
            and the instance do not collide on the same top-level YAML key
          rationale: >-
            Instance packages are named after the thing they describe, which
            makes the obvious instance name collide with the package name.
            Resolving the collision by giving the instance a longer,
            descriptive kebab-case name (model-context-protocol,
            agent-to-agent-protocol, kanonak-protocol-spec) keeps the package
            name short and recognizable while still following the
            kebab-case-for-instances rule.
      hasForbiddenRule:
        singular-category-package-rule:
          text: >-
            Category packages MUST NOT use a singular name that shadows the
            class or instance they host - for example, a package named
            "protocol" that defines the Protocol class, or a package named
            "skill" that holds a single Skill instance
          rationale: >-
            A singular category package name forces every consuming instance
            to either rename itself or fight the YAML duplicate-key error.
            Pluralizing the package eliminates the conflict at the source and
            makes it obvious from the name that the package is a namespace,
            not a single thing.
      hasValidExample:
        plural-category-packages:
          pro.value: protocols, agent-skills, agents, capabilities, skill-capabilities, agent-capabilities, github-skills, github-agents
          description: Category packages using plural kebab-case names, leaving the singular form free for the classes and instances they host
        singular-instance-package:
          pro.value: mcp (package) + model-context-protocol (instance)
          description: A specific-instance package named after its abbreviation, with a longer descriptive kebab-case instance name to avoid the duplicate-key collision
        core-rdf-package:
          pro.value: core-rdf
          description: Core RDF vocabulary using hyphen notation
      hasInvalidExample:
        uppercase-package:
          pro.value: MyPackage
          description: Invalid - contains uppercase letters. Must use lowercase only
        singular-category-package:
          pro.value: protocol (package that defines the Protocol class)
          description: Invalid - singular category package shadows the class and forces every consuming instance to work around a name collision
        colliding-instance-name:
          pro.value: mcp package + mcp instance
          description: Invalid - the package declaration and the instance both parse as the top-level YAML key "mcp", which is a duplicate key error

    versioning:
      summary: Versions follow semantic versioning to communicate compatibility and breaking changes
      hasRequiredRule:
        semantic-versioning-rule:
          text: Versions MUST follow semantic versioning format major.minor.patch where each component is a non-negative integer
          rationale: Semantic versioning provides a standard way to communicate backward compatibility and breaking changes to package consumers
        major-version-breaking-rule:
          text: Increment major version when making backward-incompatible changes to the package
          rationale: Major version increments signal to consumers that manual migration may be required due to breaking changes
        minor-version-compatible-rule:
          text: Increment minor version when adding backward-compatible functionality and patch version for backward-compatible bug fixes
          rationale: Allows consumers to safely update within the same major version while preventing unexpected breaking changes
      hasValidExample:
        standard-semver:
          pro.value: 2.1.3
          description: Valid semantic version with major 2, minor 1, patch 3
      hasInvalidExample:
        missing-patch-with-v-prefix:
          pro.value: v1.0
          description: Invalid - missing patch component and has v prefix. Must be 1.0.0

    import-operators:
      summary: Import operators, existence, and cycle constraints for package dependencies
      hasRequiredRule:
        exact-operator-rule:
          text: Use exact version operator (=) to lock imports to a specific version for reproducible builds
          rationale: Exact version matching guarantees reproducible builds and prevents unexpected breaking changes from dependency updates
        import-existence-rule:
          text: All declared imports MUST resolve to existing packages in the repository or package cache
          rationale: Missing imports break transitive resolution and prevent entity lookup. All dependencies must be available either in local workspace or installed package cache.
        import-cycle-rule:
          text: Package imports MUST NOT create circular dependency chains between published packages
          rationale: Circular package dependencies (A imports B, B imports A) create unresolvable import cycles that prevent package managers from building dependency graphs. Kanonak handles cycles gracefully at runtime but published packages cannot have circular dependencies.
      hasRecommendedRule:
        compatible-operator-rule:
          text: Use compatible version operator (~) to allow patch updates within the same minor version
          rationale: Enables bug fixes and security patches while preventing breaking changes from minor version updates
        major-operator-rule:
          text: Use major version operator (^) to allow minor and patch updates within the same major version
          rationale: Follows semantic versioning conventions where breaking changes only occur in major version increments
      hasForbiddenRule:
        any-operator-rule:
          text: Avoid any version operator (*) in production packages as it allows all future versions including breaking changes
          rationale: Creates unpredictable behavior and can introduce breaking changes without warning or control
      hasValidExample:
        exact-operator-example:
          pro.value: core-rdf = 1.0.0
          description: Locks to exactly version 1.0.0 of core-rdf
        compatible-operator-example:
          pro.value: core-xsd ~ 1.2.3
          description: Allows versions 1.2.3 through 1.2.x (patch updates only)
        major-operator-example:
          pro.value: core-owl ^ 2.0.0
          description: Allows versions 2.0.0 through 2.x.x (minor and patch updates within major version 2)
        one-way-dependency:
          pro.value: |
            # Package A has no imports (base package)
            # Package B imports A - one-way dependency
          description: One-way dependency chain with no cycles
      hasInvalidExample:
        circular-dependency:
          pro.value: |
            # Package A imports B, Package B imports A
            # Creates an unresolvable circular dependency
          description: A imports B and B imports A - circular dependency

    version-resolution:
      summary: Version resolution selects the highest compatible version from available packages
      hasRequiredRule:
        highest-compatible-rule:
          text: When resolving an import, Kanonak MUST select the highest version that satisfies the version operator constraints
          rationale: Automatic version resolution ensures packages get the latest compatible updates while respecting semantic versioning constraints. This enables bug fixes and patches without manual intervention while preventing breaking changes.
        major-zero-special-case-rule:
          text: For major version 0 (pre-1.0), the caret operator (^) MUST behave like tilde (~), allowing only patch updates
          rationale: Semantic versioning treats 0.x.y as unstable where breaking changes can occur in minor versions. Caret operator for ^0.x.y allows only patches (0.x.z) to prevent unexpected breaking changes during pre-release development.
      hasValidExample:
        tilde-resolution:
          pro.value: |
            Import:      "core-xsd ~ 1.2.3"
            Available:   1.2.1, 1.2.5, 1.3.0, 2.0.0
            Constraints: MinVersion=1.2.3, MaxVersion=1.2.999
            Selected:    1.2.5 (highest in compatible range)
          description: Version resolution selects 1.2.5 as highest compatible patch version

    file-naming:
      summary: Kanonak documents follow a standard file naming pattern for discoverability
      hasRequiredRule:
        canonical-file-name-rule:
          text: Kanonak document files MUST be named using the pattern package@version.kan.yml
          rationale: Standardized file naming enables automatic discovery, prevents conflicts, and makes the namespace structure visible in the file system. The .kan.yml extension distinguishes Kanonak files from other YAML files.
      hasRecommendedRule:
        directory-structure-rule:
          text: Kanonak documents SHOULD be organized in directories matching the publisher name
          rationale: Directory structure mirrors namespace organization making it easy to locate packages and understand ownership. Publisher directories prevent naming conflicts and enable per-publisher configuration.
      hasValidExample:
        core-rdf-file:
          pro.value: kanonak.org/core-rdf@1.0.0.kan.yml
          description: Correct file naming with publisher directory and version
        company-products-file:
          pro.value: mycompany.com/products@2.1.3.kan.yml
          description: Company package with semantic version

    yaml-parsing:
      summary: Kanonak YAML parsing preserves types and detects structural errors
      hasRequiredRule:
        type-preservation-rule:
          text: Kanonak YAML parsers MUST preserve primitive types (integer, boolean, string) from YAML into the Kanonak object model
          rationale: Type preservation ensures that integer values remain integers, booleans remain booleans, and strings remain strings through the parse-serialize round-trip. This maintains semantic meaning and enables accurate code generation.
        duplicate-key-detection-rule:
          text: Kanonak YAML parsers MUST detect and report duplicate keys with line and column information
          rationale: Duplicate keys in YAML are ambiguous and indicate authoring errors. Early detection with precise location information helps users quickly fix structural problems before semantic validation.
        utf8-bom-handling-rule:
          text: Kanonak YAML parsers MUST strip UTF-8 BOM (Byte Order Mark) if present for cross-platform compatibility
          rationale: Windows editors may add UTF-8 BOM at file start. Stripping BOM ensures files created on Windows parse correctly on Linux/Mac and vice versa, enabling seamless cross-platform collaboration.
      hasValidExample:
        primitive-types-preserved:
          pro.value: |
            age: 30        # Parsed as integer (not string "30")
            isActive: true # Parsed as boolean (not string "true")
            name: "Alice"  # Parsed as string
          description: YAML primitive types preserved through parsing
      hasInvalidExample:
        duplicate-key:
          pro.value: |
            Person:
              name: "Alice"
              name: "Bob"  # ERROR: Duplicate key 'name'
          description: Parser detects duplicate keys and reports error with line number

    resource-naming:
      summary: Distinct casing conventions per entity role make role immediately obvious and align with code generation
      hasRecommendedRule:
        resource-casing-rule:
          text: >-
            Kanonak uses three naming conventions based on entity role: classes
            use PascalCase (Person, OrderStatus), instances use kebab-case
            (romeo-montague, key-2026-03), and properties use camelCase
            (subClassOf, hasAddress). This casing rule applies to every
            instance, including inline dict-keyed embedded instances such as
            the Convention, Rule, and Example entries inside a Protocol.
          rationale: Distinct casing per role makes it immediately obvious whether an entity is a type definition (PascalCase), a data instance (kebab-case), or a property (camelCase). This improves readability, prevents confusion, and aligns with code generation conventions in target languages. Applying the rule to embedded keys too keeps the rule absolute rather than contextual, so the same entity type always looks the same in YAML no matter how it is authored.
        embedded-instance-casing-rule:
          text: >-
            Inline dict-keyed embedded instances MUST follow the same
            kebab-case rule as top-level instances. A Convention key inside
            hasConvention, a Rule key inside hasRequiredRule, an Example key
            inside hasValidExample, a CapabilityCommand key inside hasCommand,
            and so on are all instances of their respective classes - they
            just happen to be authored inline rather than as top-level
            SubjectKanonaks - and the casing rule applies identically.
          rationale: >-
            Embedded instances have the same semantic status as top-level
            instances - the SDK parses them into EmbeddedKanonak nodes that
            carry statements just like SubjectKanonaks do. Treating them as a
            stylistic label rather than an instance muddies the casing rule
            and leads to inconsistent documents where top-level and embedded
            instances of the same class look different. Holding the line on
            kebab-case for all instance keys keeps the authoring surface
            predictable.
        resource-charset-rule:
          text: Resource names SHOULD start with a letter and contain only letters, numbers, hyphens, and underscores
          rationale: Following naming conventions ensures compatibility with code generation targets and URI construction. Names that violate conventions generate warnings to encourage consistency.
      hasForbiddenRule:
        no-reserved-prefix-rule:
          text: Resource names MUST NOT use reserved RDF/OWL prefixes like 'rdfs:', 'xsd:', 'owl:' - use imports and qualified references instead
          rationale: Prefixed names (rdfs:Class) are RDF/Turtle syntax, not Kanonak YAML syntax. Kanonak uses imports with aliases for namespace qualification. Prefixes in resource names cause parser errors and violate Kanonak conventions.
      hasValidExample:
        pascal-case-classes:
          pro.value: Person, OrderStatus, SigningKey, BlogPost
          description: PascalCase - used for class (type) definitions
        kebab-case-instances:
          pro.value: romeo-montague, key-2026-03, commercial-use, alice-johnson
          description: kebab-case - used for instances (data entities), including inline dict-keyed embedded instances
        camel-case-properties:
          pro.value: subClassOf, hasAddress, signingKeyId, characterName
          description: camelCase - used for property definitions
        embedded-convention-key:
          pro.value: |
            hasConvention:
              uri-structure:
                summary: ...
          description: Inline dict-keyed Convention instance uses kebab-case exactly like a top-level instance would
      hasInvalidExample:
        reserved-rdfs-prefix:
          pro.value: rdfs-colon-Class
          description: Invalid - uses RDF colon prefix syntax (as in rdfs followed by colon followed by Class). Use plain Class with imports, then reference it as rdfs.Class when disambiguation is needed.
        pascal-case-embedded-instance:
          pro.value: |
            hasConvention:
              UriStructure:
                summary: ...
          description: Invalid - embedded Convention instance keys must be kebab-case. Rename to uri-structure.

    package-structure:
      summary: Every Kanonak document declares exactly one package with required metadata
      hasRequiredRule:
        package-required-rule:
          text: Every Kanonak document MUST contain exactly one Package declaration (a resource with type Package)
          rationale: The Package declaration provides essential metadata (publisher, version) needed for namespace resolution and dependency management. Without it, the document cannot participate in the Kanonak ecosystem.
        package-properties-rule:
          text: Package declarations MUST include 'publisher' and 'version' properties, and import entries MUST have valid publisher, package, match, and version fields
          rationale: Publisher and version are required to construct the namespace URI. Import entries must be well-formed to enable dependency resolution.
      hasValidExample:
        minimal-package:
          pro.value: |
            core-rdf:
              type: Package
              publisher: kanonak.org
              version: 1.0.0
          description: Correct package declaration with type, publisher, and version
      hasInvalidExample:
        no-package-declaration:
          pro.value: |
            # A document with only entities but no Package declaration
            Person:
              type: Class
          description: Invalid - no top-level entity with type Package

    embedding:
      summary: When to model data as an embedded object versus a named top-level entity
      hasRecommendedRule:
        embedded-for-coupled-rule:
          text: Use embedded objects for data that is tightly coupled to its parent, has no need for independent identity, and is not referenced from anywhere else
          rationale: Embedding reduces naming overhead, makes the ownership relationship explicit in the structure, and accurately maps to RDF blank nodes - which represent resources without global identity. Promoting such data to a named top-level entity creates URIs that will never be referenced, cluttering the namespace.
        named-for-identity-rule:
          text: Use named top-level entities for data that needs a stable identity, is referenced from multiple places, or represents a significant concept with an independent lifecycle
          rationale: Named entities receive a globally unique URI (publisher/package@version/name) that enables cross-document references, stable citation, and independent versioning. Any data that tooling or other entities need to point to must be named so that the pointer is well-defined.
        prefer-implicit-embedded-type-rule:
          text: An embedded object SHOULD NOT declare an explicit 'type' property when the type would equal the parent property's range - let the range supply the type implicitly
          rationale: When the embedded type matches what the parent property's range already specifies, the explicit type adds nothing beyond visual noise. Omitting it keeps documents shorter, makes the common case the default, and signals that explicit type declarations on embeddeds carry meaning - they only appear when narrowing the range to a more specific subclass. A reader who sees 'type:' on an embedded immediately knows it's communicating a non-default subtype.
      hasForbiddenRule:
        embedded-type-must-narrow-range-rule:
          text: When an embedded object declares an explicit 'type' property, that type MUST be a subclass of (or equal to) the parent property's range
          rationale: >-
            A declared type that is not a subclass of the parent's range is a
            contradiction - the parent property says "this slot holds Conditions"
            and the declared type says "this is not a Condition." Permitting it
            would silently break range-based reasoning, type checking, and code
            generation. Restricting declared types to range subclasses preserves
            the inference model while still allowing tagged-union /
            discriminated-union authoring with proper OWL subclass semantics
            (for example, declaring 'type' as 'OrCondition' on an embedded
            under a property whose range is 'Condition').
      hasValidExample:
        embedded-coupled-address:
          pro.value: |
            alice:
              type: Person
              hasAddress:
                street: "123 Main St"
                city: "Springfield"
          description: Address is embedded because it is owned by alice and never referenced elsewhere - becomes an RDF blank node. The embedded inherits its type from the parent property's range, so no 'type:' is needed.
        embedded-with-narrowing-type:
          pro.value: |
            wrapper:
              type: Wrapper
              condition:
                type: OrCondition
                operands:
                  - type: ThresholdCondition
                    observable: temperature
                    threshold: 90
                  - type: EventCondition
                    event: sensor-fault
          description: The 'condition' property's range is 'Condition'. Each embedded declares a type that is a strict subclass of 'Condition' (OrCondition, ThresholdCondition, EventCondition all subClassOf Condition), which narrows the range to a specific variant. This is the canonical tagged-union authoring form - explicit types appear precisely where the variant matters.
        named-shared-address:
          pro.value: |
            acme-headquarters:
              type: Address
              street: "1 Acme Plaza"
              city: "Metropolis"

            alice:
              type: Employee
              worksAt: acme-headquarters

            bob:
              type: Employee
              worksAt: acme-headquarters
          description: Headquarters is named because multiple employees reference the same address and the entity has identity beyond any single parent
      hasInvalidExample:
        non-subclass-embedded-type:
          pro.value: |
            wrapper:
              type: Wrapper
              condition:
                type: Person  # FORBIDDEN - Person is not a subclass of Condition
                name: Alice
          description: The 'condition' property's range is 'Condition', so the embedded's declared type must be Condition or a subclass thereof. 'Person' is unrelated to the Condition hierarchy, so this is a range violation.
        redundant-embedded-type:
          pro.value: |
            alice:
              type: Person
              hasAddress:
                type: Address  # DISCOURAGED - Address equals the parent property's range
                street: "123 Main St"
          description: >-
            The 'hasAddress' property's range is already 'Address', so
            declaring 'type' as 'Address' on the embedded is redundant. Not a
            hard error - the document is still semantically valid - but a
            reader is left wondering what the type was meant to communicate.
            Drop the line so the type is inferred implicitly.

    type-system:
      summary: Rules governing how entities declare their type and how properties declare their range
      hasRequiredRule:
        subject-type-required-rule:
          text: Top-level entities MUST have a 'type' property declaring what kind of entity they are
          rationale: Top-level entities need explicit type declaration to enable type checking, validation, and code generation. Unlike embedded objects, top-level entities have no parent property whose range can supply a type.
        property-range-required-rule:
          text: ObjectProperty and DatatypeProperty declarations MUST declare a 'range' specifying the type of values
          rationale: The range defines what values are valid for a property. Without range, type checking is impossible and the property's purpose is unclear. Range is required for both datatype properties (e.g., string, integer) and object properties (e.g., Person, Address).
        xsd-import-rule:
          text: When using XSD datatypes (string, integer, boolean, etc.) as property ranges, the core-xsd package MUST be imported
          rationale: XSD datatypes are defined in the core-xsd package. Without importing it, the type resolver cannot verify that range references point to valid datatypes.
        class-definition-rule:
          text: All classes referenced in 'type' properties MUST be defined in the current namespace or imported packages
          rationale: Using an undefined class as a type creates entities with unknown structure. The validator ensures every type reference resolves to an actual Class definition.
      hasRecommendedRule:
        property-type-specificity-rule:
          text: Properties SHOULD use specific types (DatatypeProperty or ObjectProperty) instead of generic 'Property'
          rationale: Generic Property type provides no semantic information about whether the property holds literal values or entity references. Using specific types enables better validation, code generation, and tooling support.
      hasValidExample:
        top-level-with-type:
          pro.value: |
            romeo-montague:
              type: Character
              characterName: "Romeo"
          description: Top-level entity with explicit type declaration
        datatype-property-with-range:
          pro.value: |
            name:
              type: DatatypeProperty
              domain: Person
              range: string
          description: Property with specific DatatypeProperty type and declared range
      hasInvalidExample:
        top-level-missing-type:
          pro.value: |
            romeo-montague:
              characterName: "Romeo"
          description: Invalid - top-level entity has no type property
        property-missing-range:
          pro.value: |
            name:
              type: DatatypeProperty
              domain: Person
          description: Invalid - property has no range declaration

    references:
      summary: Rules for resolving entity references across namespaces, including shadowing and disambiguation
      hasRequiredRule:
        resolvable-reference-rule:
          text: ObjectProperty values MUST reference entities that exist in the current namespace or imports (including transitive imports)
          rationale: Broken references create semantic gaps where data points to non-existent entities. This prevents typos, missing imports, and data integrity issues. All references must resolve to actual entities.
        local-shadowing-rule:
          text: When the same name exists in both the local namespace and an imported namespace, unqualified references MUST resolve to the local definition (local shadowing)
          rationale: Local shadowing allows intentional overriding, enables namespace-specific customizations, and prevents breaking changes when dependencies add new entities with colliding names.
        qualified-disambiguation-rule:
          text: When multiple imported packages define entities with the same name, references MUST use qualified syntax (alias.name) to disambiguate
          rationale: Ambiguous references make it impossible to determine which entity is intended. Qualified references (pkg.Entity) explicitly specify the source package, preventing confusion and ensuring correct type resolution.
      hasValidExample:
        local-reference:
          pro.value: |
            verona-city:
              type: City

            romeo:
              type: Character
              livesIn: verona-city
          description: Reference to a locally defined entity
        qualified-reference:
          pro.value: |
            myEntity:
              type: pkgA.Resource
          description: Qualified reference disambiguates between packages that both define Resource
      hasInvalidExample:
        broken-reference:
          pro.value: |
            romeo:
              type: Character
              livesIn: verona-city  # verona-city is not defined or imported
          description: Invalid - reference to an entity that does not exist

    hierarchy:
      summary: Class and property hierarchies must be acyclic and reference their own kind
      hasRequiredRule:
        class-hierarchy-acyclic-rule:
          text: Class inheritance (subClassOf) MUST NOT create circular chains
          rationale: Circular inheritance (A subClassOf B subClassOf A) is logically impossible and breaks reasoning systems. Class hierarchies must form directed acyclic graphs where every class has a finite path to the root Resource class.
        sub-class-of-class-rule:
          text: The subClassOf property MUST reference an entity that is itself a Class
          rationale: subClassOf establishes inheritance between classes. Referencing a non-class entity (like a property or instance) is semantically invalid and breaks type system integrity.
        property-hierarchy-acyclic-rule:
          text: Property inheritance (subPropertyOf) MUST NOT create circular chains
          rationale: Circular property inheritance (A subPropertyOf B subPropertyOf A) is logically impossible. Property hierarchies must form directed acyclic graphs.
        sub-property-of-property-rule:
          text: The subPropertyOf property MUST reference an entity that is itself a Property
          rationale: subPropertyOf establishes inheritance between properties. Referencing a non-property entity (like a Class or instance) is semantically invalid.
      hasValidExample:
        linear-class-hierarchy:
          pro.value: |
            Person:
              type: Class
            Character:
              type: Class
              subClassOf: Person
          description: Correct linear class hierarchy with no cycles
      hasInvalidExample:
        circular-class-hierarchy:
          pro.value: |
            Character:
              type: Class
              subClassOf: Hero
            Hero:
              type: Class
              subClassOf: Character
          description: Invalid - Character and Hero reference each other creating a cycle
        sub-class-of-property:
          pro.value: |
            name:
              type: DatatypeProperty
            Character:
              type: Class
              subClassOf: name
          description: Invalid - subClassOf must reference a Class, not a Property

    transformation-modeling:
      summary: How to author Transformation instances that turn Kanonak data into other formats
      hasRecommendedRule:
        prefer-set-transformation-for-cross-instance-rule:
          text: >-
            Use SetTransformation when the desired output reads from MORE than
            one input instance, even if you currently have only one input. Use
            InstanceTransformation only when the output is genuinely
            independent per input.
          rationale: >-
            The cardinality of the input binding is the substantive difference
            between the two subclasses, and authors who pick InstanceTransformation
            for a list-like task end up emitting one tiny artifact per input
            with no aggregate view. SetTransformation aggregates by default and
            falls back to per-key fan-out via partitionBy when the output
            cardinality should match a discriminator. Picking the right
            cardinality up-front avoids needing to rewrite the rule tree later.
        explicit-sort-for-ordered-iteration-rule:
          text: >-
            When iteration order matters (time-series, indexes, anything a
            reader will scan top-to-bottom), declare InputPattern.sortBy
            explicitly with one or more SortKey entries.
          rationale: >-
            Without sortBy, the runner binds inputs in the SDK's discovery
            order — deterministic but not semantically meaningful. Authors who
            depend on implicit order produce artifacts whose sequence shifts
            when the workspace's filesystem layout changes. Declaring sortBy
            makes the contract explicit and validatable; the byProperty
            reference ensures the sort key is a real Property the validator
            can check.
        partition-by-for-fan-out-rule:
          text: >-
            When a SetTransformation should produce one artifact per distinct
            value of a property (e.g. one page per author, one chart per
            region), declare SetTransformation.partitionBy referencing that
            property.
          rationale: >-
            Partitioning at the transformation level is cheaper and clearer
            than authoring N nearly-identical InstanceTransformations or
            using PartitionBy expressions to emit M sections inside one
            artifact. The structural partitionBy keeps each output focused
            on one group's data while sharing one rule definition.
        narrow-types-on-expression-embeddeds-rule:
          text: >-
            Inside an Expression rule tree, every embedded Expression node
            SHOULD declare its concrete subclass via type — type tx.Concat,
            type tx.PropertyRead, type tx.BuildAstNode, etc. Keep AstFieldBinding
            and other range-matching embeddeds implicit (no type) per the
            embedding convention's prefer-implicit-embedded-type-rule.
          rationale: >-
            The Expression hierarchy is a wide tagged-by-type tree where
            every node could be one of many concrete subclasses. Declaring
            the type at each embedded position makes the rule tree
            self-documenting and lets the validator catch mistakes (a
            mistyped property name on a wrong subclass becomes a domain
            violation). For embeddeds whose parent property has a concrete
            range (AstFieldBinding under BuildAstNode.set, FormatOverride
            under formatOverrides), explicit type is redundant — the
            range supplies it.
        is-set-for-optional-presence-rule:
          text: >-
            Use tx.IsSet over a tx.PropertyRead to gate rendering on whether
            an optional property is populated, regardless of whether the
            value is a primitive scalar, a reference, an embedded subject,
            or a non-empty list. IsSet reports presence; it doesn't
            constrain what kind of value qualifies.
          rationale: >-
            The "render this block iff the optional sub-tree is populated"
            pattern is common when an ObjectProperty is optional and the
            artifact should adapt to whether authors supplied a value.
            Restricting IsSet to primitive-only would force authors into
            workarounds (always-render-with-empty-content, list-length
            shims) that produce worse output than honest presence checks.
            The runtime contract: IsSet returns false for undefined/null,
            empty string, or empty list, and true otherwise.
        subject-uri-for-cross-input-attribution-rule:
          text: >-
            Inside a SetTransformation iteration, use the URI-segment
            primitives — tx.SubjectUri (full URI), tx.UriPublisher,
            tx.UriPackage, tx.UriVersion, tx.UriName (local name) — to
            derive per-input deep links, source-package paths,
            cross-package indexes, or per-segment display chips from
            the matched subjects. The five together cover every
            segment of the canonical Kanonak URI shape.
          rationale: >-
            Aggregate transformations are valuable when each output entry
            can correlate back to its source input. Without primitives
            for URI-segment access from inside the rule tree, authors
            either parse the rendered output client-side or duplicate
            identity into ad-hoc instance properties that drift from
            the URI. The five URI primitives put the canonical
            attribution inside the typed transformation, where it can
            be validated alongside everything else and stays in sync
            with whatever version / publisher / package the matched
            subject is actually authored under.
        multi-scope-for-cross-package-aggregation-rule:
          text: >-
            When a SetTransformation should aggregate matched instances
            across multiple packages — index pages, sitemaps, federation
            reports, time-series views over versioned snapshot packages —
            invoke the runner with one --scope flag per package.
            kanonak transform run accepts the flag repeatedly; matched
            subject sets are unioned across all scopes (deduped by URI)
            before binding to the rule's `inputs`.
          rationale: >-
            Single-scope semantics restrict candidates to subjects defined
            in the scoped package, which blocks the canonical aggregate
            use case (one artifact summarizing instances spread across
            many packages). Repeatable --scope keeps the pattern explicit
            and validatable per-scope without changing the meaning of
            "scope" itself — each scope still resolves through the
            workspace + cache + HTTP tiers exactly as a single scope
            does, and a single --scope invocation behaves unchanged.
      hasForbiddenRule:
        empty-input-on-instance-transformation-rule:
          text: >-
            An InstanceTransformation with zero matching inputs MUST be
            treated as an authoring error by the runner. If the desired
            behavior is "emit something even when there are no inputs,"
            the transformation MUST be a SetTransformation.
          rationale: >-
            The two subclasses differ on this exact contract. Emitting zero
            artifacts from an InstanceTransformation when zero inputs match
            is what the author asked for (one artifact per input, none
            present). Emitting one artifact from a SetTransformation when
            zero inputs match is also what the author asked for (one
            artifact summarizing the set, even when empty). Conflating the
            two means a SetTransformation case ("we want an index page
            even on day zero") accidentally lands as an InstanceTransformation
            and never produces the index. Pick the subclass that matches
            the cardinality semantics.
        magic-string-output-formats-rule:
          text: >-
            Transformation.outputs MUST reference named OutputFormat instances
            (tx.html, tx.markdown-with-frontmatter, tx.json, etc.), not
            string identifiers.
          rationale: >-
            OutputFormat references are validatable — the runner resolves
            the URI and looks up the registered backend by the format's
            backendUri. Authoring outputs as plain strings would silently
            accept typos, drift from the actual backend registry, and
            require every consumer to maintain its own string-to-backend
            mapping. The OutputFormat indirection is the contract the
            runner depends on.
        non-numeric-aggregation-source-rule:
          text: >-
            Sum, Min, Max, and Average MUST receive a list source whose
            elements resolve to xsd:integer or xsd:decimal values. Source
            expressions that yield strings, references, or embedded objects
            are an authoring error.
          rationale: >-
            The runner enforces strict numeric typing at evaluation time —
            non-numeric elements raise an error rather than coerce silently.
            This catches mistakes where an author intended to sum a numeric
            property but wrote a property whose range is xsd.string, or
            forgot to wrap a list of subjects in a list-map that extracts
            the numeric field. Min/Max/Average on an empty list also error,
            since the contract is undefined; guard with IsSet when an
            empty input is possible.
      hasValidExample:
        per-instance-transformation:
          pro.value: |
            skill-to-skill-md-transformation:
              type: tx.InstanceTransformation
              tx.inputPattern:
                tx.matchesClass: skills.Skill
                tx.requires:
                  - skills.name
                  - skills.description
              tx.artifactName:
                type: tx.PropertyRead
                tx.readSource:
                  type: tx.VarRef
                  tx.varName: input
                tx.readProp: skills.name
              tx.outputs:
                - tx.markdown-with-frontmatter
              tx.rule:
                type: tx.BuildAstNode
                tx.astClass: docast.Document
                # ... rest of the document-construction rule
          description: >-
            Per-instance transformation - one Skill input produces one
            SKILL.md artifact. The rule sees `input` (singular) bound to
            the matching Skill subject; artifactName carries the per-
            instance filename stem.
        aggregate-set-transformation-with-sort:
          pro.value: |
            snapshot-index:
              type: tx.SetTransformation
              tx.inputPattern:
                tx.matchesClass: wv.WorldviewSnapshot
                tx.sortBy:
                  - tx.byProperty: wv.observedAt
                    tx.order: tx.descending
              tx.artifactName:
                type: tx.StringLiteral
                tx.stringLiteral: index
              tx.outputs: [tx.html]
              tx.rule:
                type: tx.BuildAstNode
                tx.astClass: docast.Document
                # ... rule binds `inputs` (plural) to the sorted set
          description: >-
            Set transformation with sort - aggregates every WorldviewSnapshot
            into a single index page. inputs is bound to the sorted list
            (newest first); the rule typically wraps it in a ForEach to
            render one row per snapshot.
        partitioned-set-transformation:
          pro.value: |
            per-thesis-trajectory:
              type: tx.SetTransformation
              tx.inputPattern:
                tx.matchesClass: wv.WorldviewSnapshot
              tx.partitionBy: wv.thesisName
              tx.artifactName:
                type: tx.Concat
                tx.parts:
                  - type: tx.StringLiteral
                    tx.stringLiteral: "thesis-"
                  - type: tx.VarRef
                    tx.varName: key
              tx.outputs: [tx.html]
              tx.rule:
                type: tx.BuildAstNode
                tx.astClass: docast.Document
                # ... rule sees `inputs` (this partition's snapshots) + `key` (thesis name)
          description: >-
            Set transformation with fan-out - one artifact per distinct
            value of partitionBy. inputs is bound to that partition's
            members; key is bound to the partition value.
        cross-package-aggregation-invocation:
          pro.value: |
            # Same SetTransformation as aggregate-set-transformation-with-sort,
            # invoked across multiple packages. Each --scope is loaded
            # separately and the matched subject sets are unioned (deduped
            # by URI) before binding to the rule's `inputs`.
            #
            # $ kanonak transform run snapshot-index \
            #     --scope worldview.genval.ai/example-ai-capex \
            #     --scope worldview.genval.ai/example-macro \
            #     --format html \
            #     --out _site/
          description: >-
            Cross-package aggregation - the matched-subject set in
            `inputs` includes WorldviewSnapshot instances from both
            scoped packages. Authors typically pair this invocation
            shape with tx.SubjectUri inside the rule to derive
            per-input deep links back to each snapshot's source
            package.
        version-bump-as-time-axis-aggregation:
          pro.value: |
            # The version-bump-as-time-axis pattern: a publisher
            # bumps the same package's version each time the
            # underlying observation changes, so each version is one
            # immutable point on a timeline. The local name stays
            # constant ("view"); the version segment carries the
            # temporal information.
            #
            #   worldview.genval.ai/snapshot@1.0.0/view
            #   worldview.genval.ai/snapshot@1.0.1/view
            #   worldview.genval.ai/snapshot@1.0.2/view
            #
            # Three URIs, three subjects (the version is part of
            # identity per the URI structure convention). Aggregate
            # across all versions with one --scope per version:
            #
            # $ kanonak transform run snapshot-timeline \
            #     --scope worldview.genval.ai/snapshot@1.0.0 \
            #     --scope worldview.genval.ai/snapshot@1.0.1 \
            #     --scope worldview.genval.ai/snapshot@1.0.2 \
            #     --format html --out _site/timeline/
          description: >-
            Cross-version aggregation - subjects in different
            versions of the same package with the same local name
            are different instances. The runner's multi-scope dedup
            keys on the full URI including version, so the timeline
            transformation sees one entry per version. tx.SubjectUri
            inside the rule emits version-qualified URIs for stable
            deep links.
        per-version-chip-via-uri-version:
          pro.value: |
            # Render each timeline card with its package version as a
            # display chip. tx.UriVersion extracts the version segment
            # from the matched subject's URI directly — no need to
            # author the version as a separate property on every
            # snapshot, no need to parse the rendered HTML client-
            # side.
            #
            # Inside a ForEach over `inputs`:
            #
            #   - type: tx.StringLiteral
            #     tx.stringLiteral: '<span class="snapshot-version">v'
            #   - type: tx.UriVersion
            #     tx.uriVersionOf:
            #       type: tx.VarRef
            #       tx.varName: snapshot
            #   - type: tx.StringLiteral
            #     tx.stringLiteral: '</span>'
            #
            # Companion primitives — tx.UriPublisher and tx.UriPackage —
            # cover the other URI segments and follow the same shape.
          description: >-
            Per-segment URI access via tx.UriPublisher / tx.UriPackage /
            tx.UriVersion / tx.UriName. Useful for display chips,
            grouping headers, and any rendering that wants identity
            data without round-tripping through SubjectUri + string
            parsing.
      hasInvalidExample:
        instance-transformation-when-set-was-meant:
          pro.value: |
            broken-index:
              type: tx.InstanceTransformation
              tx.inputPattern:
                tx.matchesClass: wv.WorldviewSnapshot
              tx.rule:
                type: tx.BuildAstNode
                tx.astClass: docast.Document
                # ... author wrote a per-input rule but expected one combined index
          description: >-
            Wrong subclass - emits one Document per snapshot rather than
            one combined index. The author wanted aggregation; the type
            should be tx.SetTransformation with the rule iterating
            `inputs` rather than reading `input`.
        magic-string-output:
          pro.value: |
            broken-output:
              type: tx.InstanceTransformation
              tx.outputs:
                - markdown-with-frontmatter
          description: >-
            Wrong - outputs must be a reference to a named OutputFormat
            instance, not a plain string. The validator rejects the
            string form because it cannot verify a backend exists for
            it.

    open-world-augmentation:
      summary: >-
        Any Kanonak package may assert statements about any entity
        defined in any other package, by referencing the entity through
        an aliased name in the augmenting document's body. The parser
        merges all statements about the same canonical URI into one
        Subject, just as RDF specifies for IRI assertions across
        documents.
      hasRequiredRule:
        canonical-uri-merge-rule:
          text: >-
            When two or more packages declare entities whose canonical
            URI (publisher + package + version + local name) is the
            same, the parser MUST merge their statements into a single
            SubjectKanonak. Conflicting statements (different objects
            for the same predicate) MUST coexist; consumers handle
            precedence by load order or explicit declaration.
          rationale: >-
            RDF semantics are open-world by design. Forcing all
            statements about a class to live in its defining package
            would make publisher augmentation impossible and force
            every cross-cutting concern (universal renderers, peer
            observations, federated annotations) into a fork-and-bump
            of the upstream package. Open-world merge unblocks the
            polymorphic-derivation pattern where universal defaults
            live in their own package without touching core.
      hasRecommendedRule:
        prefer-augmentation-over-fork-rule:
          text: >-
            When you need to add statements to an upstream class
            (e.g. attaching a default renderer, a peer annotation, a
            commercial extension), prefer declaring those statements
            in your own package by referencing the class via an
            aliased name (rdfs.Resource, skill.Skill) rather than
            forking the upstream package and editing it.
          rationale: >-
            Augmentation keeps your concerns in your namespace,
            preserves upstream version pinning, and composes with
            other publishers' augmentations. Forking decouples you
            from upstream updates and forces coordination on every
            release.
      hasValidExample:
        augment-rdfs-resource:
          pro.value: >-
            # Augmenting `rdfs.Resource` (defined in core-rdf) with
            # a `derivations` property from a separate package.
            #
            # universal-derivations: { type: Package, ..., imports:
            # [{ publisher: kanonak.org, packages: [{ package: core-rdf,
            # version: 1.0.0, alias: rdfs }] }] }
            #
            # Then in the same document:
            #
            # rdfs.Resource:
            #   derivation.derivations: [...]
            #
            # No `type:` is asserted on rdfs.Resource here — we are
            # NOT redefining it, we are augmenting it. The parser
            # merges these statements with the original definition
            # in core-rdf because both resolve to the same canonical
            # URI: kanonak.org/core-rdf@1.0.0/Resource.
          description: >-
            Valid - the alias prefix `rdfs.` resolves through the
            document's imports; the entity name `rdfs.Resource`
            canonicalizes to `kanonak.org/core-rdf@1.0.0/Resource`,
            and the merge happens at parse time.

    derivation-bindings:
      summary: >-
        A class declares the transformations that produce its derived
        artifacts via a `derivations` list. Each Derivation entry binds
        a (format, variant) pair to a TransformationReference. Discovery
        walks the class hierarchy bottom-up to find the first matching
        binding.
      hasRecommendedRule:
        derivations-on-class-rule:
          text: >-
            Declare `derivation.derivations` on the class whose
            instances should be derivable into a given format. Use
            named instances of `formats.Format` and
            `derivation.Variant` for the format and variant fields —
            never magic strings.
          rationale: >-
            Magic strings drift (`js` vs `javascript`, `csharp` vs
            `c-sharp`). Named instances are URI-comparable, validate
            in the type system, and let publishers extend the
            vocabulary by defining their own format / variant
            instances without coordinating with anyone.
        prefer-class-level-over-instance-level-rule:
          text: >-
            Prefer declaring derivations on the class. Only declare
            them on a specific instance when that instance needs a
            shape no other instance of the class wants — a one-off
            override.
          rationale: >-
            Class-level bindings inherit through subclasses and apply
            to every instance for free. Per-instance bindings are
            full replacements (not merges with the class), so an
            instance that overrides loses access to all the class's
            other bindings unless it re-declares them.

    derivation-override-semantics:
      summary: >-
        Override semantics differ by level. Class-hierarchy override
        merges by (format, variant) key — a subclass overriding
        `html/default` keeps its parent's `markdown/summary`.
        Per-instance override replaces entirely — an instance that
        declares its own derivations sees no class-level bindings.
      hasRequiredRule:
        class-merge-by-format-variant-rule:
          text: >-
            When discovery walks the class hierarchy, statements at
            DIFFERENT classes for the SAME (format, variant) pair
            are resolved by closest-class-wins (subclass takes
            precedence over superclass). Statements at DIFFERENT
            classes for DIFFERENT (format, variant) pairs ALL
            apply — they merge.
          rationale: >-
            Authors expect inheritance to behave like CSS specificity
            or method override in OO: a subclass override replaces
            the specific binding while inheriting the others. The
            merge-by-key behavior is what makes universal defaults
            useful — you override what you want to customize, inherit
            the rest.
        instance-override-replaces-rule:
          text: >-
            When an instance declares its own `derivations`, those
            REPLACE all class-level bindings for that instance — no
            merge. Instances that override take full ownership of
            all (format, variant) pairs they want available.
          rationale: >-
            Instance-level overrides are deliberate "this resource is
            special" statements. Merging them with class bindings
            would re-introduce silent fallback behavior and mask
            which fields the author intended to override at the leaf.
            Replace semantics align with the no-mocks/no-fallbacks
            rule — failure to declare a binding is visible, not
            silently filled.

    universal-default-derivations:
      summary: >-
        The `kanonak.org/universal-derivations@1.0.0` package augments
        `rdfs.Resource` with default derivations so EVERY Kanonak
        resource has at least HTML / Markdown / JSON artifacts
        available out of the box, without per-publisher action.
        Publisher classes override per (format, variant) only where
        they have something domain-specific to say.
      hasRecommendedRule:
        rely-on-universal-defaults-rule:
          text: >-
            Authors of new classes SHOULD NOT declare derivations for
            formats covered by universal-derivations (html, markdown,
            json) unless they have a publisher-specific shape to
            render. Letting the universal default apply is the path
            of least surprise — consumers get consistent rendering
            across publishers.
          rationale: >-
            The Kanonak Browser model is the consumer story: point it
            at any URI, walk the class hierarchy, find the right
            derivation, render. Per-class redeclaration of
            already-universal bindings is noise and divergence;
            override only when the publisher has earned the right to
            differ.
        ship-publisher-vocab-without-derivations-rule:
          text: >-
            New publisher vocabulary packages MAY ship without any
            `derivations` declarations. Their instances will still
            render via the universal defaults inherited from
            rdfs.Resource. Add publisher-specific derivations later
            as the rendering needs of those instances become clear.
          rationale: >-
            Removes the adoption tax. A publisher who declares a new
            class today gets HTML / Markdown / JSON renderings for
            free; they can add domain-specific transformations as a
            later iteration without blocking initial usability.

    site-curation:
      summary: >-
        Publisher-curated content (StaticPage, Asset, AggregateView)
        is authored as Kanonak resources and materialized via
        `kanonak site build`. StaticPage holds about-page-style
        content; Asset holds shared CSS / JS / nav HTML referenced
        by layout transformations; AggregateView wraps a
        SetTransformation + scope so cross-resource pages (timelines,
        indexes, changes) are declarative instead of CI-script logic.
      hasRecommendedRule:
        static-page-for-non-derived-content-rule:
          text: >-
            Pages that are NOT derived from another resource (about
            pages, privacy notices, documentation landings, glossaries)
            SHOULD be authored as `site.StaticPage` instances rather
            than embedded in CI heredocs or hand-written HTML files.
            The page's content lives in the Kanonak graph; the
            publisher's HTML layout transformation renders it.
          rationale: >-
            The about-page-as-heredoc pattern was the canonical
            symptom of "this content has nowhere to live in the
            ontology." StaticPage gives it a home; universal
            defaults render it for free; publisher overrides give
            it the site-styled chrome. The content stops being
            divorced from the rest of the publisher's data graph.
        shared-assets-via-asset-class-rule:
          text: >-
            CSS / JS / shared HTML fragments used by multiple layout
            transformations SHOULD be authored as `site.Asset`
            instances (mediaType + content) and pulled into
            transformations via `tx.PropertyRead` against
            `site.content` (typically wrapped in `tx.ResolveRef +
            tx.UriLiteral`). Replaces copy-paste of style/script
            blocks across N transformations.
          rationale: >-
            Per-transformation duplication of style/script blocks
            was the worst class of drift in the worldview pain
            points (theme variables had to be edited in 5 places
            for one CSS variable change). Centralizing assets as
            Kanonak resources lets one author edit propagate
            everywhere without coordination.
        aggregate-view-for-cross-resource-pages-rule:
          text: >-
            Pages that aggregate over multiple resources of the same
            class (timelines, indexes, changes pages, registries)
            SHOULD be authored as `site.AggregateView` instances —
            scopeClass + scopeSources + transformation + outputPath.
            `kanonak site build` materializes them; consumers stop
            authoring per-aggregate workflow steps.
          rationale: >-
            The "scope enumeration in CI shell" anti-pattern was
            the second-worst pain point in worldview's workflow.
            Each aggregate page required an explicit bash loop to
            list packages and pass them as `--scope` arguments.
            AggregateView captures the same intent declaratively;
            the `pkg@*` wildcard handles the time-axis case
            (every version of a snapshot package).

    cli-default-wrapper-opt-out:
      summary: >-
        Transformations that build a complete output document
        themselves (their own `<!DOCTYPE html>`, their own CSS, their
        own page chrome) can declare `tx.omitWrapper: true` on the
        relevant tx.FormatOverride to suppress the CLI's default
        chrome. The HTML backend then emits ONLY the rendered
        children. JSON / plain-Markdown backends ignore the flag
        because they have no chrome.
      hasRecommendedRule:
        omit-wrapper-for-publisher-layouts-rule:
          text: >-
            When a transformation produces a complete HTML document
            (publisher layout transformations that inline their own
            CSS, nav, header, footer), declare
            `tx.formatOverrides: [{ tx.formatTarget: tx.html,
            tx.omitWrapper: true }]` so the CLI's default chrome
            doesn't double-wrap the output.
          rationale: >-
            The CLI's default HTML wrapper was designed for the
            "transformation produces a fragment" case. For
            publisher layouts that produce the complete page, it
            was actively hostile — authors had to override its CSS
            with `!important` and hide its `<dl class="metadata">`
            with display:none. omitWrapper makes the opt-out
            explicit and idiomatic.

    content-shaping-primitives:
      summary: >-
        transformations@3.5.0 ships expression primitives for the
        content-shaping work that previously forced inline JS into
        rendered HTML: DateFormat (ISO datetime → human-readable),
        Add/Subtract/Multiply/Divide (arithmetic for SVG coordinates,
        evidence counts, sized text positions), and Reverse (newest-
        first orderings of source-chronological lists).
      hasRecommendedRule:
        prefer-engine-primitives-over-inline-js-rule:
          text: >-
            When a rendered artifact needs computed content (formatted
            dates, computed positions, reversed orderings), prefer
            the matching tx 3.5.0 expression primitive over emitting
            inline JS to do the work in the consumer's browser.
          rationale: >-
            Inline JS is consumer-side work that locks every
            consumer of the artifact into a JS-capable runtime,
            and lives in a place no other tool can discover or
            reason about. Engine primitives produce the same value
            at transformation time and ship JS-free artifacts
            consumable by anything that can read HTML / Markdown.
            The transformation rule becomes the single source of
            truth for the computation.

    context-aware-iteration:
      summary: >-
        transformations@3.6.0 adds the iterator family that gives
        bodies access to neighboring elements (PairwiseMap,
        WindowedMap) or a running accumulator (Scan), with
        ListItemAt as the indexing helper. Closes the structural
        gap that previously forced inline JS for any analytical
        view that needs cross-element context — pairwise diffs,
        running aggregations, sliding statistics, gap rendering
        between consecutive events, state-change detection over
        an audit trail.
      hasRecommendedRule:
        prefer-pairwise-map-for-consecutive-pair-rule:
          text: >-
            For "render a result for each consecutive pair in a
            sorted sequence" patterns (changelogs, diff views,
            day-over-day comparisons, state-transition rendering),
            use `tx.PairwiseMap` with named `firstVar` / `secondVar`
            binders rather than emitting raw per-element data and
            computing pair-context in inline JS. The body composes
            with the existing iterator family — `tx.Filter` for
            set-difference, `tx.Subtract` for delta computation,
            `tx.Concat` for diff-card rendering.
          rationale: >-
            The per-consecutive-pair shape is the dominant context-
            aware iteration case across analytical Kanonak content.
            Named binders read cleaner than positional indexing
            (`prev` and `curr` vs. `window[0]` and `window[1]`),
            and the pair-body composition with the existing
            iterator family covers most realistic analytical needs.
            Inline JS for this pattern moves analytical logic out
            of the protocol layer where any consumer can inspect
            it and into a presentation layer that no other tool
            can reason about.
        use-windowed-map-when-window-size-exceeds-2-rule:
          text: >-
            For windows of size 3 or larger (rolling-3 averages,
            running statistics, k-element sliding aggregates),
            use `tx.WindowedMap` with explicit `windowSize` +
            `tx.ListItemAt` for positional access into the bound
            window list.
          rationale: >-
            Rolling-window statistics (smoothing, anomaly detection,
            multi-step trend analysis) genuinely need access to k
            elements at once. WindowedMap covers any k; ListItemAt
            provides the positional access. Stride is fixed at 1 —
            the dedicated tumbling / anchored window modes are
            deferred (would ship as `tx.windowMode: tumbling` or
            `tx.windowMode: anchored` in a future minor bump).
        use-scan-for-running-aggregation-rule:
          text: >-
            For cumulative aggregations whose value at each
            position depends on all prior elements (running sum,
            cumulative confidence shift, rolling state machine,
            running min/max), use `tx.Scan` with explicit
            `tx.initialState`, `tx.stateVar`, `tx.elementVar`,
            and `tx.accumulate` body. Distinct from windowing —
            Scan sees a *running aggregation*, WindowedMap sees a
            *window of elements*.
          rationale: >-
            Running aggregations can't be expressed via windowing
            because the value at position N depends on EVERY prior
            element, not a fixed window. Scan threads the
            accumulator through; the body returns both the next
            accumulator AND the per-position emission. Distinct
            shape; distinct primitive.
        empty-source-is-empty-result-rule:
          text: >-
            All three primitives emit an empty result when the
            source is shorter than required (PairwiseMap on length
            0 or 1; WindowedMap on length less than windowSize;
            Scan on length 0). This matches `tx.ForEach` over an
            empty source — silent empty, not an error. Authors who
            need "no windows" to branch should guard with
            `tx.IsSet` over the result.
          rationale: >-
            Aggregate views over publishers with one snapshot
            (pre-Pairwise era) would error otherwise; silent empty
            is the more useful default. The no-mocks/no-fallbacks
            rule still applies — what's NOT silent is that the
            engine produces ZERO outputs, which is visible to the
            consumer.

    comparison-and-boolean-primitives:
      summary: >-
        transformations@3.7.0 ships the eleven primitives that
        unblock comparison-based rendering on top of windowed
        iteration: Equals, four ordering comparisons, Not, And/Or,
        Contains (list membership), and Abs/Negate. Previously,
        the only boolean-producing surface for `tx.Filter.predicate`
        and `tx.When.condition` was `tx.IsSet` and `tx.BooleanLiteral`,
        which couldn't express any of the comparisons a diff /
        threshold / lookup workflow needs.
      hasRecommendedRule:
        equals-for-uri-or-value-equality-rule:
          text: >-
            Use `tx.Equals` (with `compareLeft` / `compareRight`)
            for any equality test. URI equality applies to
            ReferenceKanonak / SubjectKanonak operands (compares
            publisher + package + name; version ignored — equality
            is identity-by-name across versions). Value equality
            applies to string / number / boolean literals.
            Cross-kind operands return false; either operand
            undefined returns false.
          rationale: >-
            URI equality is what authors expect when comparing
            references — two refs to "thesis foo" are equal even
            if they came from different snapshot versions.
            Cross-kind false (rather than throwing) keeps Equals
            usable inside Filter.predicate without needing type
            guards; authors can chain Equals with Not/And/Or
            without worrying about runtime exceptions on
            heterogeneous data. Undefined → false is the RDF
            spec semantic: missing values aren't equal to
            anything, even themselves.
        prefer-contains-over-filter-count-rule:
          text: >-
            For "is this needle in this haystack list" lookups,
            use `tx.Contains` (with `haystack` + `needle`) rather
            than the equivalent `tx.Filter` with an `Equals`
            predicate followed by `tx.Count > 0`. Contains is
            named exactly because it's the right tool for that
            shape; the longer composition obscures intent.
          rationale: >-
            Authors reach for membership constantly in diff /
            lookup workflows ("is this thesis in the previous
            snapshot's hasThesis list?"). Filter+Count works but
            wastes three nodes on a one-line idea. Contains is
            ergonomic sugar over the same semantic.
        short-circuit-and-or-with-side-effecting-source-rule:
          text: >-
            `tx.And` / `tx.Or` short-circuit on the first non-true
            / first true operand respectively. Place expensive
            operands (Traverse, ResolveRef, Filter over a large
            list) AFTER cheap ones (IsSet, BooleanLiteral) so the
            short-circuit can skip them when not needed.
          rationale: >-
            Short-circuiting matters when later operands trigger
            cross-package reference resolution or large list
            filtering. The order of operands is the author's
            optimization handle.
        empty-and-or-or-list-is-vacuous-rule:
          text: >-
            `tx.And` over an empty operand list is vacuously true;
            `tx.Or` over an empty operand list is vacuously false.
            Mathematical convention. Authors who iterate to build
            an operand list (rare) should guard with `tx.IsSet`
            on the result if "no operands" should branch.
          rationale: >-
            The vacuous identities make And/Or compose cleanly
            with iterators that may or may not produce operands.
            Erroring on empty would break those compositions
            without offering authors a clear path forward.
        abs-for-magnitude-vs-threshold-rule:
          text: >-
            For magnitude-vs-threshold patterns (e.g.
            `abs(delta) >= 0.005`), use `tx.Abs` rather than the
            `tx.Multiply(x, x) >= threshold * threshold` workaround.
            The intent reads at the call site.
          rationale: >-
            `Multiply(x, x) >= threshold * threshold` is correct
            but obscures intent — the reader has to spot the
            squared-magnitude trick. `Abs` makes the comparison
            shape obvious.
